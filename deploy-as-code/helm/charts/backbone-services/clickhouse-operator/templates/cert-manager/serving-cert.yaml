{{- if and .Values.certManager.enable .Values.webhook.enable }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "clickhouse-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "clickhouse-operator.resourceName" (dict "suffix" "serving-cert" "context" $) }}
  namespace: {{ .Values.namespace }}
spec:
  dnsNames:
  - {{ include "clickhouse-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}.{{ .Values.namespace }}.svc
  - {{ include "clickhouse-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}.{{ .Values.namespace }}.svc.cluster.local
  issuerRef:
  {{- if .Values.certManager.issuerRef}}
    {{ .Values.certManager.issuerRef | toYaml | nindent 4 }}
  {{- else }}
    kind: Issuer
    name: {{ include "clickhouse-operator.resourceName" (dict "suffix" "selfsigned-issuer" "context" $) }}
  {{- end }}
  secretName: webhook-server-cert
{{- end }}
