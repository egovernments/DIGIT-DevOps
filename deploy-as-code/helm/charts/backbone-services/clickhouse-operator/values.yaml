## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""
namespace: clickhouse

## String to fully override chart.fullname template
##
fullnameOverride: "clickhouse"

## Global values shared across this chart and its subcharts.
##
global:
  ## Optional registry prefix prepended to every image repository rendered by
  ## this chart. Routes all pulls through a single mirror/proxy registry.
  ## Empty disables the prefix. Overrides per-image registry settings.
  ## Example: "my-proxy.example.com" renders
  ##          my-proxy.example.com/ghcr.io/clickhouse/clickhouse-operator
  ##
  imageRegistry: ""

## Configure the controller manager settings
##
controller:
  ## List of namespaces to watch for resources.
  ##
  watchNamespaces: [ ]
  ## Controls whether the operator creates and manages PodDisruptionBudgets
  ## for ClickHouseCluster and KeeperCluster resources.
  ## Disable means operator will not call any PDB related API.
  ##
  pdbManagement:
    enable: true


## Configure the controller manager deployment
##
manager:
  ## Set to false to skip manager installation
  ##
  enabled: true

  replicas: 1

  image:
    ## Optional registry prefix for this image. Overridden by global.imageRegistry
    ## when set. Empty uses repository as-is.
    ##
    registry: ""
    repository: ghcr.io/clickhouse/clickhouse-operator
    ## Digest of the image to use. Tag is used if unset.
    ##
    ## digest: sha256:abc123
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    tag: ""
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Env overrides (--set manager.envOverrides.VAR=value)
  ## Same name in env above: this value takes precedence.
  ##
  envOverrides: {}

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64
            - ppc64le
            - s390x
          - key: kubernetes.io/os
            operator: In
            values:
            - linux

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Deployment strategy
  ##
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  ## Priority class name
  ##
  # priorityClassName: ""

  ## Topology spread constraints
  ##
  # topologySpreadConstraints: []

  ## Termination grace period seconds
  ##
  terminationGracePeriodSeconds: 10

  ## Custom Deployment labels
  ##
  # labels: {}

  ## Custom Deployment annotations
  ##
  # annotations: {}

  ## Custom Pod labels and annotations
  ##
  # pod:
  #   labels: {}
  #   annotations: {}

  ## Extra volumes and volume mounts
  ##
  extraVolumes: [ ]

  extraVolumeMounts: [ ]

## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enable: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enable: true

  ## Existing ServiceAccount name (only when enable=false)
  ## Note: When enable=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enable: true
  # Metrics server port
  port: 8080
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
    enable: true
    ## Custom issuer configuration for cert-manager issued certificates.
    ##
    # issuerRef:
    #   name: "issuer"
    #   kind: "ClusterIssuer"

## Webhook server configuration
##
webhook:
  enable: true
  # Webhook server port
  port: 9443

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  # Add annotations to allow Prometheus service discovery scrape metrics.
  scraping_annotations: false
  # Enable Prometheus ServiceMonitor for metrics scraping.
  # Requires prometheus-operator to be installed in the cluster.
  enable: false


# Extra manifests to deploy as an array
extraManifests: []
  # - |
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #   labels:
  #     name: prometheus-extra
  #   data:
  #     extra-data: "value"
