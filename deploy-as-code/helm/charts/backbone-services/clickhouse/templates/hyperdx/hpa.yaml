{{- if .Values.hyperdx.enabled }}
{{- if .Values.hyperdx.autoscaling.enabled }}
{{- if hasKey .Values.hyperdx.autoscaling.spec "scaleTargetRef" }}
{{- fail "hyperdx.autoscaling.spec must not include scaleTargetRef -- the chart auto-wires it to the HyperDX Deployment. Remove scaleTargetRef from your autoscaling.spec values." }}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "clickstack.hyperdx.fullname" . }}
  namespace: {{ include "clickstack.namespace" . }}
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "clickstack.hyperdx.fullname" . }}
  {{- with .Values.hyperdx.autoscaling.spec }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
