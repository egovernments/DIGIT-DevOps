{{/*
The MCK operator's MongoDBCommunity CR requires passwordSecretRef to point
to a Secret with a key named "password". This template bridges the shared
clickstack-secret (which uses MONGODB_PASSWORD) to the format MCK expects.
*/}}
{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickstack.mongodb.fullname" . }}-password
  namespace: {{ include "clickstack.namespace" . }}
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.hyperdx.secrets.MONGODB_PASSWORD | quote }}
{{- end }}
