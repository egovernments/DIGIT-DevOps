apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ include "novu.namespace" . }}
  labels:
{{- toYaml .Values.api.labels | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.port }}
  selector:
{{- toYaml .Values.api.labels | nindent 4 }}
