apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.dashboard.name }}
  namespace: {{ include "novu.namespace" . }}
  labels:
{{- toYaml .Values.dashboard.labels | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: {{ .Values.dashboard.port }}
  selector:
{{- toYaml .Values.dashboard.labels | nindent 4 }}
