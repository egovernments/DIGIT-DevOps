{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ include "novu.namespace" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
  {{- if .Values.ingress.hostName }}
    - host: {{ .Values.ingress.hostName }}
  {{- else }}
    - host: {{ .Values.global.domain }}
  {{- end }}
      http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ .Values.ingress.service.name }}
                port:
                  number: {{ .Values.ingress.service.port }}
  tls:
{{- if .Values.ingress.tls }}
  {{- tpl .Values.ingress.tls . | nindent 2 }}
{{- end }}
{{- if .Values.ingress.hostName }}
  - hosts:
    - {{ .Values.ingress.hostName }}
    secretName: {{ .Values.ingress.hostName }}-tls-certs
{{- else }}
  - hosts:
    - {{ .Values.global.domain }}
    secretName: {{ .Values.global.domain }}-tls-certs
{{- end }}
{{- end }}
