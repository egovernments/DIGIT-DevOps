apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ include "novu.namespace" . }}
  labels:
{{- toYaml .Values.redis.labels | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
  selector:
{{- toYaml .Values.redis.labels | nindent 4 }}
