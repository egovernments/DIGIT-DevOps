{{- $root := . -}}
{{- $t := .Values.temporal -}}
{{- if $t.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: temporal-web
  namespace: {{ $t.namespace }}
  labels:
    {{- include "temporal.labels" $root | nindent 4 }}
    component: web
spec:
  type: {{ $t.web.service.type }}
  selector:
    {{- include "temporal.selectorLabels" (list $root "web") | nindent 4 }}
  ports:
    - name: http
      port: {{ $t.web.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
