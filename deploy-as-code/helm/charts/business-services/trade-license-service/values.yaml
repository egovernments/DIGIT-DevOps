# Common Labels
labels:
  app: "trade-license-service"
  group: "tl"

namespace: egov

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "trade-license-service"

# Container Configs
image:
  repository: "trade-license-service"
replicas: "1"
healthChecks:
  enabled: false
  livenessProbePath: "/health"
  readinessProbePath: "/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx192m -Xms192m"
java-args: "-Dspring.profiles.active=monitoring"
java-debug: "true"
tl-search-default-limit: "10"
tl-application-num-format: "PB-TL-[cy:yyyy-MM-dd]-[SEQ_EG_TL_APL]"
tl-payment-topic-name: "egov.collection.payment-create"
tl-license-num-format: "PB-TL-[cy:yyyy-MM-dd]-[SEQ_EG_PT_LN]"
tl-userevents-pay-link: "citizen/otpLogin?mobileNo=$mobile&redirectTo=egov-common/pay?consumerCode=$applicationNo&tenantId=$tenantId&businessService=$businessService"
tl-msg-pay-link: "citizen/withoutAuth/egov-common/pay?consumerCode=$consumercode&tenantId=$tenantId&businessService=$businessservice"

# Additional Container Envs
env: |
  - name: DIGIT_SERVICES_BOUNDARY_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: boundary
  - name: DIGIT_SERVICES_WORKFLOW_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: workflowgo
  - name: DIGIT_SERVICES_IDGEN_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: idgen
  - name: DIGIT_SERVICES_NOTIFICATION_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: notification
  - name: DIGIT_SERVICES_FILESTORE_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: filestore
  - name: DIGIT_SERVICES_MDMS_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: mdms-service-v2
  - name: BILLING_SERVICE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: billing
  - name: DIGIT_SERVICES_REGISTRY_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: registry
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: JAVA_ENABLE_DEBUG
    value: {{ index .Values "java-debug" | quote }}
  - name: SERVER_PORT
    value: "8080"
  - name: SECURITY_BASIC_ENABLED
    value: "false"  
  - name: MANAGEMENT_SECURITY_ENABLED
    value: "false"     
