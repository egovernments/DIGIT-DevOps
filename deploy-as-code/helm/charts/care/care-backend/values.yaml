labels:
  app: "care-backend"
  group: "care"

namespace: care

ingress:
  enabled: false
  # Served at <domain>/api (Django serves its routes under /api, so no rewrite).
  context: "api"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

image:
  repository: ghcr.io/care-ecosystem/care-backend
  tag: dev-80-0c34706
  pullPolicy: Always

replicas: 1
httpPort: 9000
appType: ""

# care-backend image has no ENTRYPOINT/CMD (Cmd=python3); start the web server
# explicitly. start.sh runs gunicorn config.wsgi:application --bind 0.0.0.0:9000
# (also waits for db/redis, collectstatic, compilemessages). WorkingDir=/app.
args: |
  - ./start.sh

healthChecks:
  enabled: true
  livenessProbePath: "/ping/"
  readinessProbePath: "/ping/"
  livenessProbe: |
    httpGet:
      path: "/ping/"
      port: 9000
      httpHeaders:
        - name: X-Forwarded-Proto
          value: https
    initialDelaySeconds: 180
    timeoutSeconds: 5
    periodSeconds: 30
    successThreshold: 1
    failureThreshold: 3
  readinessProbe: |
    httpGet:
      path: "/ping/"
      port: 9000
      httpHeaders:
        - name: X-Forwarded-Proto
          value: https
    initialDelaySeconds: 120
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

resources: |
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

initContainers:
  # common's dbMigration runs the image's default CMD (no command hook) — useless for
  # care (Cmd=python3) and it also breaks rendering. We run migrations via an explicit
  # `migrate` init container below instead.
  dbMigration:
    enabled: false
  gitSync:
    enabled: false
  extraInitContainers: |
    - name: wait-for-postgres
      image: postgres:alpine
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          until pg_isready -h $POSTGRES_HOST -p 5432; do
            echo "Waiting for postgres..."
            sleep 2
          done
      env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: egov-config
              key: db-host
    - name: wait-for-redis
      image: redis:8-alpine
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          until redis-cli -h redis.backbone -p 6379 ping; do
            echo "Waiting for redis..."
            sleep 2
          done
    - name: migrate
      image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
      imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
      workingDir: /app
      command: ["python", "manage.py", "migrate", "--noinput"]
      env:
        - name: DJANGO_SETTINGS_MODULE
          value: config.settings.production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: care-secrets
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: care-secrets
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: care-secrets
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: egov-config
              key: db-host
        - name: POSTGRES_DB
          value: {{ .Values.postgresDb | default "care" | quote }}
        - name: PGDATABASE
          value: {{ .Values.postgresDb | default "care" | quote }}
        - name: POSTGRES_PORT
          value: "5432"

env: |
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        key: POSTGRES_USER
        name: care-secrets
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        key: POSTGRES_PASSWORD
        name: care-secrets
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        key: DATABASE_URL
        name: care-secrets
  - name: BUCKET_PROVIDER
    value: {{ .Values.bucketProvider | default "AWS" | quote }}
  - name: BUCKET_KEY
    valueFrom:
      secretKeyRef:
        key: awskey
        name: egov-filestore
  - name: BUCKET_SECRET
    valueFrom:
      secretKeyRef:
        key: awssecretkey
        name: egov-filestore
  - name: POSTGRES_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-host
  - name: POSTGRES_DB
    value: {{ .Values.postgresDb | default "care" | quote }}
  # wait_for_db.sh connects with no dbname (libpq would default to the username);
  # PGDATABASE makes the bootstrap connect target the real DB.
  - name: PGDATABASE
    value: {{ .Values.postgresDb | default "care" | quote }}
  - name: POSTGRES_PORT
    value: "5432"
  - name: ALLOWED_HOSTS
    value: "*"
  - name: DJANGO_SETTINGS_MODULE
    value: config.settings.production
  - name: CORS_ALLOW_ALL_ORIGINS
    value: "True"
  - name: CORS_ALLOW_CREDENTIALS
    value: "True"
  - name: CORS_ALLOWED_ORIGINS
    value: {{ .Values.corsAllowedOrigins | default "[\"https://unified-dev.digit.org\"]" | quote }}
  - name: CSRF_TRUSTED_ORIGINS
    value: {{ .Values.csrfTrustedOrigins | default "[\"https://unified-dev.digit.org\"]" | quote }}
  - name: SECURE_SSL_REDIRECT
    value: "False"
  - name: DEBUG
    value: "false"
  - name: DJANGO_DEBUG
    value: "false"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: BUCKET_ENDPOINT
    value: {{ .Values.bucketEndpoint | default "" | quote }}
  - name: BUCKET_EXTERNAL_ENDPOINT
    value: {{ .Values.bucketExternalEndpoint | default "" | quote }}
  - name: BUCKET_HAS_FINE_ACL
    value: "False"
  - name: BUCKET_REGION
    value: {{ .Values.bucketRegion | default "ap-south-1" | quote }}
  - name: FACILITY_S3_BUCKET
    value: {{ .Values.facilityBucket | default .Values.bucket | default "facility-bucket" | quote }}
  - name: FILE_UPLOAD_BUCKET
    value: {{ .Values.fileUploadBucket | default .Values.bucket | default "patient-bucket" | quote }}
  - name: CELERY_BROKER_URL
    value: {{ .Values.celeryBrokerUrl | default "redis://redis:6379/0" | quote }}
  - name: REDIS_URL
    value: {{ .Values.redisUrl | default "redis://redis:6379" | quote }}
  - name: ABDM_CLIENT_ID
    valueFrom:
      secretKeyRef:
        key: ABDM_CLIENT_ID
        name: care-secrets
  - name: ABDM_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        key: ABDM_CLIENT_SECRET
        name: care-secrets
  - name: ABDM_AUTH_URL
    value: http://care-backend:9000/abdm/auth
  - name: ABDM_GATEWAY_URL
    value: https://dev.abdm.gov.in/gateway/v0.5
  - name: ABDM_ABHA_URL
    value: https://dev.abdm.gov.in/abha/v3
  - name: ABDM_FACILITY_URL
    value: https://dev.abdm.gov.in/facility/v1
  - name: ABDM_HIP_NAME_PREFIX
    value: digit
  - name: ABDM_HIP_NAME_SUFFIX
    value: care
  - name: ABDM_USERNAME
    value: abdm_service_user
  - name: ABDM_CM_ID
    value: sbx
  - name: AUTH_USER_MODEL
    value: users.User
  - name: SCRIBE_API_PROVIDER
    value: openai
  - name: SCRIBE_AUDIO_MODEL_NAME
    value: gpt-4o-mini-transcribe
  - name: SCRIBE_CHAT_MODEL_NAME
    value: gpt-4o-mini
  - name: SCRIBE_TNC
    value: "<p>By using this feature, you consent to audio processing for clinical documentation.</p>"
  - name: SCRIBE_OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        key: SCRIBE_OPENAI_API_KEY
        name: care-secrets
  - name: CARE_RADIOLOGY_WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        key: CARE_RADIOLOGY_WEBHOOK_SECRET
        name: care-secrets
  - name: CARE_RADIOLOGY_DCM4CHEE_DICOMWEB_BASEURL
    value: http://radiology-dcm4chee.care:8080/dcm4chee-arc/aets/DCM4CHEE
  - name: CARE_RADIOLOGY_VIEWER_URL
    value: https://{{ .Values.global.domain }}/radio-proxy
  - name: DCM4CHEE_DICOMWEB_BASEURL
    value: http://radiology-dcm4chee.care:8080/dcm4chee-arc/aets/DCM4CHEE
  - name: WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        key: WEBHOOK_SECRET
        name: care-secrets
  - name: EAUSHADHI_API_ENDPOINT
    value: https://aushada.karnataka.gov.in/e-services/api/instinward/eGovuser
  - name: EAUSHADHI_API_SECRET_KEY
    valueFrom:
      secretKeyRef:
        key: EAUSHADHI_API_SECRET_KEY
        name: care-secrets
  - name: EAUSHADHI_API_RETRY_COUNT
    value: "5"
  - name: LOG_LEVEL
    value: INFO
  - name: ENABLE_REQUEST_TIME_LOGGING
    value: "false"
