{{- include "superset.init" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-nginx-config
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 5;
        gzip_types text/plain text/css text/xml text/javascript
                   application/x-javascript application/xml+rss
                   application/json application/javascript;

        # Temp paths (writable in non-root container)
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp_path;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        upstream superset_app {
            server 127.0.0.1:8088;
            keepalive 100;
        }

        server {
            listen {{ .Values.web.nginx.port | default 8080 }} default_server;
            server_name _;
            client_max_body_size {{ .Values.web.nginx.clientMaxBodySize | default "100M" }};

            # Health check endpoint (no prefix)
            location = /health {
                proxy_pass http://superset_app{{ .Values.contextPath }}/health;
                proxy_set_header Host $http_host;
            }

            # Static assets - served directly by nginx
            location {{ .Values.contextPath }}/static/ {
                proxy_pass http://superset_app{{ .Values.contextPath }}/static/;
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # Proxy all other requests to Superset
            location {{ .Values.contextPath }}/ {
                proxy_pass http://superset_app{{ .Values.contextPath }}/;
                proxy_set_header Host $http_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Port $server_port;
                proxy_http_version 1.1;
                proxy_redirect off;
                port_in_redirect off;
                proxy_connect_timeout {{ .Values.web.nginx.proxyTimeout | default 300 }};
                proxy_read_timeout {{ .Values.web.nginx.proxyTimeout | default 300 }};
                proxy_send_timeout {{ .Values.web.nginx.proxyTimeout | default 300 }};
                proxy_buffering off;
            }
        }
    }
