{{- include "superset.init" . -}}
{{- if .Values.beat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-beat
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
    component: beat
spec:
  replicas: 1  # Beat should always be 1 replica
  selector:
    matchLabels:
      app: {{ .Values.name }}
      component: beat
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        component: beat
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      initContainers:
        - name: install-psycopg2
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Installing psycopg2-binary to shared volume..."
              pip install --no-cache-dir --target=/python-packages psycopg2-binary
              echo "psycopg2-binary installed successfully!"
          volumeMounts:
            - name: python-packages
              mountPath: /python-packages
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
      containers:
        - name: beat
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
          env:
            - name: SUPERSET_ENV
              value: "production"
          volumeMounts:
            - name: superset-config
              mountPath: /app/pythonpath
              readOnly: true
            - name: python-packages
              mountPath: /python-packages
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              export PYTHONPATH="/python-packages:/app/pythonpath:$PYTHONPATH"
              exec celery --app=superset.tasks.celery_app:app beat \
                --loglevel={{ .Values.beat.logLevel }} \
                --schedule /tmp/celerybeat-schedule
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
      volumes:
        - name: superset-config
          configMap:
            name: {{ .Values.name }}-config
        - name: python-packages
          emptyDir: {}
{{- end }}
