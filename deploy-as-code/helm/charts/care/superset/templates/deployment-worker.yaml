{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
      component: worker
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        component: worker
    spec:
      initContainers:
        - name: install-psycopg2
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Installing psycopg2-binary to shared volume..."
              pip install --no-cache-dir --target=/python-packages psycopg2-binary
              echo "psycopg2-binary installed successfully!"
          volumeMounts:
            - name: python-packages
              mountPath: /python-packages
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
      containers:
        - name: worker
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
          env:
            - name: SUPERSET_ENV
              value: "production"
          volumeMounts:
            - name: superset-config
              mountPath: /app/pythonpath
              readOnly: true
            - name: python-packages
              mountPath: /python-packages
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              export PYTHONPATH="/python-packages:/app/pythonpath:$PYTHONPATH"
              exec celery --app=superset.tasks.celery_app:app worker \
                --pool={{ .Values.worker.poolType }} \
                --concurrency={{ .Values.worker.concurrency }} \
                --loglevel={{ .Values.worker.logLevel }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  export PYTHONPATH="/python-packages:/app/pythonpath:$PYTHONPATH"
                  celery -A superset.tasks.celery_app:app inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: {{ .Values.worker.probes.initialDelay }}
            timeoutSeconds: {{ .Values.worker.probes.timeout }}
            failureThreshold: {{ .Values.worker.probes.failureThreshold }}
            periodSeconds: {{ .Values.worker.probes.period }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: superset-config
          configMap:
            name: {{ .Values.name }}-config
        - name: python-packages
          emptyDir: {}
{{- end }}
