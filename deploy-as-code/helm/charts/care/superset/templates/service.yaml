{{- include "superset.init" . -}}
{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  selector:
    app: {{ .Values.name }}
    component: web
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.web.nginx.port }}
      protocol: TCP
      name: http
  type: {{ .Values.service.type }}
{{- end }}
