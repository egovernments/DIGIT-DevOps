{{- with index .Values "cluster-configs" "secrets" "jenkins" }}
{{- range $key, $val := .kubeConfigs }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $key }}-kube-config
  namespace: {{ index $.Values "cluster-configs" "secrets" "jenkins" "namespace" }}
type: Opaque
data:
  config: {{ toYaml $val | b64enc | quote }}
---    
{{- end }}   
{{- end }}