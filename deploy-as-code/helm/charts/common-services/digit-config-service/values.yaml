# Common Labels
labels:
  app: "digit-config-service"
  group: "egov"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "config-service"
  namespace: "egov"

# Init Containers - DB Migration
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "digit_config_service_schema"
    image:
      repository: "digit-config-service-db"

# Container Configs
image:
  repository: "digit-config-service"
replicas: "1"
httpPort: 8080
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx192m -Xms192m"
java-args: "-Dspring.profiles.active=monitoring"

# Health Checks
healthChecks:
  enabled: true
  livenessProbePath: "/config-service/health"
  readinessProbePath: "/config-service/health"

# Resources
memory_limits: "512Mi"
resources: |
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: {{ .Values.memory_limits | quote }}
    cpu: "300m"

# Environment variables
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/config-service"
  - name: CONFIG_DEFAULT_OFFSET
    value: "0"
  - name: CONFIG_DEFAULT_LIMIT
    value: "100"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  {{- if index .Values "tracing-enabled" }}
  - name: TRACER_OPENTRACING_ENABLED
    value: "true"
  {{- end }}
  # Service Host References (following standard DIGIT pattern)
  - name: EGOV_ENC_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-enc-service
  - name: MDMS_V2_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: mdms-v2
  # Service Configuration
  - name: MDMS_V2_SCHEMA_SEARCH_PATH
    value: "/mdms-v2/schema/v1/_search"
  - name: MDMS_V2_VALIDATION_ENABLED
    value: "true"
  - name: EGOV_ENC_ENCRYPT_ENDPOINT
    value: "/egov-enc-service/crypto/v1/_encrypt"
  - name: EGOV_ENC_DECRYPT_ENDPOINT
    value: "/egov-enc-service/crypto/v1/_decrypt"
  - name: ENCRYPTION_SERVICE_ENABLED
    value: "true"
  # Additional Configuration
  - name: STATE_LEVEL_TENANT_ID
    value: "pg"
  - name: HTTP_CLIENT_CONNECTION_TIMEOUT
    value: "30000"
  - name: HTTP_CLIENT_READ_TIMEOUT
    value: "60000"
  - name: KAFKA_BROKER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-brokers
  - name: TRACER_DETAILED_TRACING_ENABLED
    value: "false"
  - name: TRACER_ERRORS_SEND_TO_KAFKA
    value: "false"
  - name: KAFKA_TOPIC_AUDIT
    value: "egov.core.audit"
