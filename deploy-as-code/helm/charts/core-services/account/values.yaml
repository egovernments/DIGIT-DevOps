# Common Labels
labels:
  app: "account"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "account"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "account_schema"
    image:
      repository: "account-db"
      tag: "schema-migration-changes-b62dce1"
    env: |
      - name: DB_URL
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: db-url
      - name: SCHEMA_TABLE
        value: "account_schema"
      - name: FLYWAY_USER
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-username
      - name: FLYWAY_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-password
      - name: JAVA_ENABLE_DEBUG
        value: "TRUE"
      - name: FLYWAY_LOCATIONS
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: flyway-locations

# Container Configs
image:
  repository: "account"
replicas: 1
appType: "go"
tracing-enabled: true
memory_limits: 512Mi
healthChecks:
  enabled: false
  livenessProbePath: "/health"
  readinessProbePath: "/health"
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"


# Additional Container Envs
env: |
  - name: DB_HOST
    value: "postgresql-lts.egov"
  - name: DB_PORT
    value: "5432"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: DB_NAME
    value: "postgres"
  - name: DB_SSL_MODE
    value: "disable"
  - name: SERVER_PORT
    value: "8080"
  - name: CONTEXT_PATH
    value: "/account"
  - name: KEYCLOAK_BASE_URL
    value: "https://digit-lts.digit.org/keycloak"
  - name: KEYCLOAK_ADMIN_USER
    value: "digit"
  - name: KEYCLOAK_ADMIN_PASS
    value: "digit@321"
  - name: KEYCLOAK_REALM_CONFIG_PATH
    value: ""
  - name: CITIZEN_BROKER_CLIENT_ID
    value: "citizen-broker"
  - name: CITIZEN_BROKER_CLIENT_SECRET
    value: "zjlrLxJCFpsRIemN9pJpUC9Wy9gjWS7m"
  - name: AUTH_SERVER_CLIENT_SECRET
    value: "changeme"
  - name: GIN_MODE
    value: "release"
  - name: NOTIFICATION_BASE_URL
    valueFrom:
