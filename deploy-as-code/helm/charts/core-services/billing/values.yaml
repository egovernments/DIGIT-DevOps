# Common Labels
labels:
  app: "billing"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "billing"


# Container Configs

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "billing_schema"
    image:
      repository: "billing-db"
    env: |
      - name: DB_URL
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: db-url
      - name: SCHEMA_TABLE
        value: "billing_schema"
      - name: FLYWAY_USER
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-username
      - name: FLYWAY_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-password
      - name: JAVA_ENABLE_DEBUG
        value: "TRUE"
      - name: FLYWAY_LOCATIONS
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: flyway-locations
      - name: FLYWAY_SCHEMAS
        value: "public"
      - name: FLYWAY_DEFAULT_SCHEMA
        value: "public"

# Container Configs
image:
  repository: "billing"
replicas: "1"
appType: "go"
tracing-enabled: true
healthChecks:
  enabled: false
  livenessProbePath: "/health"
  readinessProbePath: "/health"
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# Additional Container Envs
env: |
  - name: HTTP_PORT
    value: "8080"
  - name: SERVER_CONTEXT_PATH
    value: "/billing"
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-host
  - name: DB_PORT
    value: "5432"
  - name: DB_SSL_MODE
    value: "require"
  - name: DB_NAME
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-name
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: DEMAND_ENABLE_ARREARS
    value: "TRUE"
  - name: IDGEN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-idgen
  - name: IDGEN_PATH
    value: "idgen/v3/generate"
  - name: IDGEN_BILL_NUMBER_TEMPLATE_CODE
    value: "BillNumber"
  - name: IDGEN_RECEIPT_NUMBER_TEMPLATE_CODE
    value: "ReceiptNumber"
  - name: IDGEN_TRANSACTION_NUMBER_TEMPLATE_CODE
    value: "TransactionNumber"
  - name: APPORTION_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-apportion-service
  - name: APPORTION_BILL_PATH
    value: "apportion-service/v2/bill/_apportion"
  - name: HTTP_CLIENT_TIMEOUT_SECONDS
    value: "5"
  - name: MAX_INSTRUMENT_DATE_AGE_DAYS
    value: "90"
  - name: MESSAGE_BROKER_ENABLED
    value: "false"
  - name: MESSAGE_BROKER_TYPE
    value: "KAFKA"
  - name: KAFKA_BROKERS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-brokers
  - name: KAFKA_CONSUMER_GROUP
    value: "billing-service"
  - name: KAFKA_AUTO_CREATE_TOPICS
    value: "true"
  - name: KAFKA_PARTITIONS
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: REDIS_ADDR
    value: "redis.backbone:6379"
  - name: REDIS_PASSWORD
    value: ""
  - name: REDIS_DB
    value: "0"
  - name: REDIS_CONSUMER_GROUP
    value: "billing-service"
  - name: REDIS_CONSUMER_ID
    value: "billing-service-1"
  - name: REDIS_STREAM_RETENTION_DAYS
    value: "7"
  - name: REDIS_STREAM_MAX_LEN
    value: "1000000"
  - name: REDIS_STREAM_CLEANUP_INTERVAL
    value: "24h"
  - name: PUBSUB_REDIS_ADDR
    value: "redis.backbone:6379"
  - name: PUBSUB_REDIS_PASSWORD
    value: ""
  - name: PUBSUB_REDIS_DB
    value: "0"
  - name: PUBSUB_ENABLED
    value: "false"
  - name: PUBSUB_TYPE
    value: "kafka"
  - name: BULK_BILL_CONSUMER_BATCH_SIZE
    value: "10"
  - name: BULK_BILL_GENERATION_PUBSUB_TOPIC
    value: "bulk-bill-generator"
  - name: BULK_BILL_GENERATION_DLQ_PUBSUB_TOPIC
    value: "bulk-bill-generator-dlq"
  - name: JAEGER_SERVICE_NAME
    value: "billing"
  - name: JAEGER_SAMPLER_TYPE
    value: "remote"
  - name: JAEGER_AGENT_HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: JAEGER_AGENT_PORT
    value: "6831"
  - name: JAEGER_SAMPLER_MANAGER_HOST_PORT
    value: "$(JAEGER_AGENT_HOST):5778"
  - name: JAEGER_SAMPLER_PARAM
    value: "1"
  - name: TRACER_OPENTRACING_ENABLED
    value: "true"
  - name: OTEL_ENABLED
    value: "false"
  - name: OTEL_SERVICE_NAME
    value: "billing-service"
  - name: OTEL_SERVICE_VERSION
    value: "1.0.0"
  - name: OTEL_METRICS_ENABLED
    value: "false"
  - name: PROMETHEUS_PORT
    value: "9090"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "1.0"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "localhost:4320"
  - name: OTEL_TRACES_EXPORTER
    value: "none"
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: "account-migration"
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: "filesystem:/opt/digit/db/migrations"
  - name: MIGRATION_SCRIPT_PATH
    value: "/opt/digit/migrate.sh"
  - name: MIGRATION_FLYWAY_BIN
    value: "/opt/flyway/flyway"
  - name: MIGRATION_SCHEMA_TABLE
    value: "billing_schema"
  - name: LOG_LEVEL
    value: "info"
  - name: CONSOLE_LOGS_ENABLED
    value: "true"
