# Common Labels
labels:
  app: "cdc-consumer"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "cdc-consumer"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: false
    schemaTable: "egov_cdc_consumer_schema"
    image:
      repository: "egov-cdc-consumer-db"

# Container Configs
image:
  repository: "cdc-consumer"
replicas: "1"
healthChecks:
  enabled: false
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx256m -Xms256m"
memory_limits: 512Mi
java-args: "-Dspring.profiles.active=monitoring"


# Additional Container Envs
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: CDC_SOURCE
    value: {{ index .Values "cdc-source" | quote }}
  - name: CDC_KAFKA_TOPIC
    value: {{ index .Values "cdc-kafka-topic" | quote }}
  - name: CDC_KAFKA_CONSUMER_GROUP
    value: {{ index .Values "cdc-kafka-consumer-group" | quote }}
  - name: CDC_DEBEZIUM_NAME
    value: {{ index .Values "cdc-debezium-name" | quote }}
  - name: CDC_DEBEZIUM_DATABASE_HOSTNAME
    value: {{ index .Values "cdc-debezium-database-hostname" | quote }}
  - name: CDC_DEBEZIUM_DATABASE_PORT
    value: {{ index .Values "cdc-debezium-database-port" | quote }}
  - name: CDC_DEBEZIUM_DATABASE_DBNAME
    value: {{ index .Values "cdc-debezium-database-dbname" | quote }}
  - name: CDC_DEBEZIUM_DATABASE_SERVER_NAME
    value: {{ index .Values "cdc-debezium-database-server-name" | quote }}
  - name: CDC_DEBEZIUM_SLOT_NAME
    value: {{ index .Values "cdc-debezium-slot-name" | quote }}
  - name: CDC_DEBEZIUM_PLUGIN_NAME
    value: {{ index .Values "cdc-debezium-plugin-name" | quote }}
  - name: CDC_DEBEZIUM_PUBLICATION_NAME
    value: {{ index .Values "cdc-debezium-publication-name" | quote }}
  - name: CDC_DEBEZIUM_SCHEMA_INCLUDE_LIST
    value: {{ index .Values "cdc-debezium-schema-include-list" | quote }}
  - name: CDC_DEBEZIUM_TABLE_INCLUDE_LIST
    value: {{ index .Values "cdc-debezium-table-include-list" | quote }}
  - name: CDC_STORAGE_TYPE
    value: {{ index .Values "cdc-storage-type" | quote }}
  - name: CDC_STORAGE_BASE_DIR
    value: {{ index .Values "cdc-storage-base-dir" | quote }}
  - name: CDC_STORAGE_MAX_FILE_BYTES
    value: {{ index .Values "cdc-storage-max-file-bytes" | quote }}
  - name: CDC_STORAGE_MAX_FILES
    value: {{ index .Values "cdc-storage-max-files" | quote }}
  - name: CDC_VAULT_BASE_URL
    value: "http://vault.vault-new.svc.cluster.local:8200"
  - name: CDC_VAULT_TOKEN
    valueFrom:
      secretKeyRef:
        name: vault-root-token
        key: token
  - name: CDC_VAULT_TRANSIT_MOUNT
    value: {{ index .Values "cdc-vault-transit-mount" | quote }}
  - name: CDC_VAULT_KEY_TYPE
    value: {{ index .Values "cdc-vault-key-type" | quote }}
  {{- if index .Values "cluster-configs" "configmaps" "egov-config" "data" "db-otel-url" }}
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-otel-url
  {{- else if index .Values "cluster-configs" "configmaps" "egov-config" "data" "db-url" }}
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-url
  {{- end }}
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: CDC_DEBEZIUM_DATABASE_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: CDC_DEBEZIUM_DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-brokers
  - name: OTEL_TRACES_EXPORTER
    value: "none"
  - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
    value: "org.postgresql.Driver"
