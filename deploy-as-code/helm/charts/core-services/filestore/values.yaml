# Common Labels
labels:
  app: "filestore"
  group: "core"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "filestore_schema"
    image:
      repository: "filestore-db"
    env: |
        - name: "DB_URL"
          valueFrom:
            configMapKeyRef:
              name: egov-config
              key: db-url
        - name: "SCHEMA_TABLE"
          value: {{ .Values.initContainers.dbMigration.schemaTable | quote }}
        - name: "FLYWAY_USER"
          valueFrom:
            secretKeyRef:
              name: db
              key: flyway-username
        - name: "FLYWAY_PASSWORD"
          valueFrom:
            secretKeyRef:
              name: db
              key: flyway-password
        - name: JAVA_ENABLE_DEBUG
          value: "TRUE"
        - name: "FLYWAY_LOCATIONS"
          valueFrom:
            configMapKeyRef:
              name: egov-config
              key: flyway-locations
        - name: FLYWAY_SCHEMAS
          value: public
        - name: FLYWAY_DEFAULT_SCHEMA
          value: public

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "filestore"

# Container Configs
image:
  repository: "filestore"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/filestore/health"
  readinessProbePath: "/filestore/health"
appType: "java-spring"
tracing-enabled: true
is-bucket-fixed: "true"
fixed-bucketname: "unified-dev-bucket-s3"
heap: "-Xmx256m -Xms256m"
file-storage-mount-path: "/filestore"
is-nfs-enabled: false
is-s3-enabled: true
minio-enabled: true
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

persistence:
  enabled: false

# Additional Container Envs
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: DB_HOST
    value: postgresql-lts.egov
  - name: DB_PORT
    value: "5432"
  - name: DB_SSL_MODE
    value: disable
  - name: DB_NAME
    value: postgres
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        key: username
        name: db
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        key: password
        name: db
  - name: MINIO_BUCKET
    value: digit
  - name: MINIO_READ_BUCKET
    value: digit
  - name: MINIO_USE_SSL
    value: "false"
  - name: S3_BUCKET
    value: unified-dev-bucket-s3
  - name: S3_READ_BUCKET
    value: unified-dev-bucket-s3
  - name: S3_USE_SSL
    value: "true"
  - name: S3_REGION
    value: ap-south-1
  - name: ISNFSSTORAGEENABLED
    value: {{ index .Values "is-nfs-enabled" | quote }}
  {{- if index .Values "is-nfs-enabled" }}
  - name: ISNFSSTORAGEENABLED
    value: "true"
  - name: DISK_STORAGE_HOST_URL
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: egov-services-fqdn-name
  - name: SOURCE_DISK
    value: "diskStorage"
  {{- end }}
  {{- if index .Values "is-s3-enabled" }}
  - name: ISS3ENABLED
    value: "true"
  {{- end }}
  {{- if index .Values "minio-enabled" }}
  - name: MINIO_ACCESS_KEY
    value: fillthis
  - name: MINIO_SECRET_KEY
    value: fillthis
  {{- end }}
  - name: S3_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        key: awskey
        name: egov-filestore
  - name: S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        key: awssecretkey
        name: egov-filestore
  - name: S3_SOURCE
    value: S3333
  {{- if index .Values "is-bucket-fixed" }}
  - name: IS_BUCKET_FIXED
    value: {{ index .Values "is-bucket-fixed" | quote }}
  {{- end }}
  {{- if index .Values "fixed-bucketname" }}
  - name: FIXED_BUCKETNAME
    value: {{ index .Values "fixed-bucketname" | quote }}
  {{- end }}
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: ALLOWED_FORMATS_MAP
    value: {{ index .Values "allowed-file-formats-map" | quote }}
  {{- if index .Values "minio-enabled" }}
  - name: MINIO_ENDPOINT
    value: minio.default.svc.cluster.local:9000
  {{- end }}
  - name: S3_ENDPOINT
    value: s3.ap-south-1.amazonaws.com
  {{- if index .Values "filestore-url-validity" }}
  - name: PRESIGNED_URL_EXPIRY_TIME_IN_SECS
    value: {{ index .Values "filestore-url-validity" | quote }}
  {{- end }}
  - name: OTEL_TRACES_EXPORTER
    value: none
  - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
    value: org.postgresql.Driver
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      configMapKeyRef:
        key: db-url
        name: egov-config
  - name: FLYWAY_ENABLED
    value: "false"
  - name: SPRING_FLYWAY_ENABLED
    value: "false"
  - name: MANAGEMENT_ENDPOINTS_WEB_BASE_PATH
    value: /
  - name: APP_TIMEZONE
    valueFrom:
      configMapKeyRef:
        key: timezone
        name: egov-config
  - name: FLYWAY_URL
    valueFrom:
      configMapKeyRef:
        key: db-url
        name: egov-config
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        key: username
        name: db
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        key: password
        name: db
  - name: SPRING_DATASOURCE_TOMCAT_INITIAL_SIZE
    valueFrom:
      configMapKeyRef:
        key: spring-datasource-tomcat-initialSize
        name: egov-config
  - name: SERVER_TOMCAT_MAX_THREADS
    valueFrom:
      configMapKeyRef:
        key: server-tomcat-max-threads
        name: egov-config
  - name: SERVER_TOMCAT_MAX_CONNECTIONS
    valueFrom:
      configMapKeyRef:
        key: server-tomcat-max-connections
        name: egov-config
  - name: SPRING_DATASOURCE_TOMCAT_MAX_ACTIVE
    valueFrom:
      configMapKeyRef:
        key: spring-datasource-tomcat-max-active
        name: egov-config
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM-POOL-SIZE
    valueFrom:
      configMapKeyRef:
        key: spring-datasource-tomcat-max-active
        name: egov-config
  - name: KAFKA_CONFIG_BOOTSTRAP_SERVER_CONFIG
    valueFrom:
      configMapKeyRef:
        key: kafka-brokers
        name: egov-config
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    valueFrom:
      configMapKeyRef:
        key: kafka-brokers
        name: egov-config
  - name: SPRING_JPA_SHOW_SQL
    valueFrom:
      configMapKeyRef:
        key: spring-jpa-show-sql
        name: egov-config
  - name: IS_ENVIRONMENT_CENTRAL_INSTANCE
    value: "false"
  - name: JAEGER_SERVICE_NAME
    value: filestore
  - name: JAEGER_SAMPLER_TYPE
    value: remote
  - name: JAEGER_AGENT_HOST
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.hostIP
  - name: JAEGER_AGENT_PORT
    value: "6831"
  - name: JAEGER_SAMPLER_MANAGER_HOST_PORT
    value: $(JAEGER_AGENT_HOST):5778
  - name: TRACER_OPENTRACING_ENABLED
    value: "true"
  - name: OTEL_ENABLED
    value: "true"
  - name: OTEL_SERVICE_NAME
    value: filestore
  - name: OTEL_SERVICE_VERSION
    value: 1.0.0
  - name: OTEL_METRICS_ENABLED
    value: "true"
  - name: PROMETHEUS_PORT
    value: "9090"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "1.0"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: open-telemetry-opentelemetry-collector.monitoring.svc.cluster.local:4318
  - name: PUBSUB_ENABLED
    value: "true"
  - name: PUBSUB_TYPE
    value: redis
  - name: KAFKA_BROKERS
    value: release-name-kafka-controller-headless.kafka-kraft:9092
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: filestore-service
  - name: REDIS_ADDRESS
    value: redis.backbone.svc.cluster.local:6379
  - name: REDIS_PASSWORD
  - name: REDIS_DB
    value: "0"
  - name: REDIS_CONSUMER_GROUP
    value: filestore-service
  - name: REDIS_CONSUMER_ID
    value: filestore-service-1
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "86400"
  - name: PUBSUB_TOPIC_UPLOAD_FILE
    value: filestore-upload-file
  - name: PUBSUB_TOPIC_CREATE_DOC_CATEGORY
    value: filestore-create-doc-category
  - name: PUBSUB_TOPIC_UPDATE_DOC_CATEGORY
    value: filestore-update-doc-category
  - name: PUBSUB_TOPIC_DELETE_DOC_CATEGORY
    value: filestore-delete-doc-category
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: account-migration
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: filesystem:/opt/digit/db/migrations
  - name: MIGRATION_SCRIPT_PATH
    value: /opt/digit/migrate.sh
  - name: MIGRATION_FLYWAY_BIN
    value: /opt/flyway/flyway
