# Common Labels
labels:
  app: "individual"
  group: "core"
  namespace: egov

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "individual"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "individual_schema"
    image:
      repository: "individual-db"
    env: |
      - name: DB_URL
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: db-url
      - name: SCHEMA_TABLE
        value: "individual_service_schema"
      - name: FLYWAY_USER
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-username
      - name: FLYWAY_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-password
      - name: JAVA_ENABLE_DEBUG
        value: "TRUE"
      - name: FLYWAY_LOCATIONS
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: flyway-locations
      - name: FLYWAY_SCHEMAS
        value: "public"
      - name: FLYWAY_DEFAULT_SCHEMA
        value: "public"

# Container Configs
image:
  repository: "individual"
replicas: "1"
healthChecks:
  enabled: false
  livenessProbePath: "/health"
  readinessProbePath: "/health"
appType: "go"
tracing-enabled: true
state-level-tenant-id: "pg"

resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# Additional Container Envs
env: |
 - name: SERVER_PORT
    value: "8080"
  - name: SERVER_CONTEXT_PATH
    value: "/individual"
  - name: GIN_MODE
    value: "release"
  - name: APP_TIMEZONE
    value: "UTC"
  - name: DB_HOST
    value: "pgbouncer.egov"
  - name: DB_PORT
    value: "5432"
  - name: DB_SSL_MODE
    value: "disable"
  - name: DB_NAME
    value: "postgres"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: MAX_IDLE_CONNS
    value: "10"
  - name: MAX_OPEN_CONNS
    value: "50"
  - name: CONN_MAX_LIFETIME
    value: "5m"
  - name: DB_MAX_OPEN_CONNS
    value: "50"
  - name: DB_MAX_IDLE_CONNS
    value: "10"
  - name: DB_CONN_MAX_LIFETIME
    value: "300"
  - name: REDIS_HOST
    value: "redis.backbone"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    value: ""
  - name: REDIS_DB
    value: "0"
  - name: REDIS_POOL_SIZE
    value: "10"
  - name: CACHE_TTL
    value: "60"
  - name: CACHE_ENABLED
    value: "true"
  - name: IDGEN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: idgen
  - name: IDGEN_PATH
    value: "idgen/v1/generate"
  - name: IDGEN_ENABLED
    value: "true"
  - name: IDGEN_INDIVIDUAL_ID_FORMAT
    value: "individual"
  - name: STATE_LEVEL_TENANT_ID
    value: "pg"
  - name: EGOV_MDMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: mdms-service-v2
  - name: EGOV_MDMS_SEARCH_ENDPOINT
    value: "/mdms-v2/v1/_search"
  - name: EGOV_ENC_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-enc-service
  - name: LOCALIZATION_SERVICE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: localization
  - name: LOCALIZATION_SEARCH_PATH
    value: "/localization/messages/v1/_search"
  - name: KEYCLOAK_BASE_URL
    value: "https://digit-lts.digit.org/keycloak"
  - name: KEYCLOAK_ENABLED
    value: "true"
  - name: KEYCLOAK_ASSIGNABLE_ROLES
    value: "ASSIGNER,CITIZEN"
  - name: BOUNDARY_SERVICE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: boundary
  - name: BOUNDARY_SEARCH_PATH
    value: "/boundary/v1"
  - name: BOUNDARY_HIERARCHY
    value: "HCM-Hierarchy"
  - name: VAULT_HOST
    value: "http://vault.vault-new.svc.cluster.local:8200"
  - name: VAULT_ENCRYPT_PATH
    value: "encrypt/"
  - name: VAULT_TOKEN
    valueFrom:
      secretKeyRef:
        name: vault-root-token
        key: token
  - name: VAULT_TRANSIT_BASE_PATH
    value: "v1/transit/"
  - name: VAULT_SYS_MOUNT_TRANSIT_PATH
    value: "v1/sys/mounts/transit"
  - name: VAULT_KEY_CREATE_PATH
    value: "keys/"
  - name: VAULT_ASYM_SUFFIX
    value: "-asym"
  - name: VAULT_ASYM_ENCRYPT_PATH
    value: "encrypt/"
  - name: VAULT_AUTH_KUBERNETES_LOGIN_PATH
    value: "v1/auth/kubernetes/login"
  - name: VAULT_AUTH_KUBERNETES_ROLE
    value: "enc-service-role"
  - name: VAULT_K8S_TOKEN_PATH
    value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  - name: VAULT_SIGN_PATH
    value: "sign/"
  - name: VAULT_VERIFY_PATH
    value: "verify/"
  - name: VAULT_DECRYPT_PATH
    value: "decrypt/"
  - name: VAULT_ENABLED
    value: "true"
  - name: VAULT_ENCRYPT_KEY
    value: "IndividualEncrypt"
  - name: VAULT_DECRYPT_KEY
    value: "IndividualEncrypt"
  - name: VAULT_SEARCH_ENCRYPT_KEY
    value: "IndividualSearchEncrypt"
  - name: USER_SERVICE_HOST
    value: "http://localhost:8092"
  - name: USER_CREATE_PATH
    value: "/user/users/_createnovalidate"
  - name: USER_UPDATE_PATH
    value: "/user/users/_updatenovalidate"
  - name: USER_SEARCH_PATH
    value: "/user/_search"
  - name: USER_INTEGRATION_ENABLED
    value: "true"
  - name: SMS_SERVICE_HOST
    value: "http://localhost:8094"
  - name: SMS_SEND_PATH
    value: "/notification/v3/sms/send"
  - name: NOTIFICATION_SMS_ENABLED
    value: "true"
  - name: NOTIFICATION_SMS_DISABLED_ROLES
    value: "ORG_ADMIN"
  - name: AADHAAR_PATTERN
    value: "\\d{12}"
  - name: MOBILE_PATTERN
    value: "\\d{10}"
  - name: DEFAULT_LIMIT
    value: "100"
  - name: MAX_LIMIT
    value: "1000"
  - name: VALIDATOR_PLUGINS_ENABLED
    value: "false"
  - name: VALIDATOR_PLUGIN_DIR
    value: "./plugins"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "json"
  - name: PUBSUB_ENABLED
    value: "false"
  - name: PUBSUB_TYPE
    value: "redis"
  - name: KAFKA_BROKERS
    value: "release-name-kafka-controller-headless.kafka-kraft:9092"
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: "individual-service"
  - name: REDIS_ADDRESS
    value: "redis.backbone.svc.cluster.local:6379"
  - name: REDIS_CONSUMER_GROUP
    value: "individual-service"
  - name: REDIS_CONSUMER_ID
    value: "individual-service-1"
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "86400"
  - name: PUBSUB_TOPIC_CREATE_INDIVIDUAL
    value: "individual-create-individual"
  - name: PUBSUB_TOPIC_UPDATE_INDIVIDUAL
    value: "individual-update-individual"
  - name: PUBSUB_TOPIC_DELETE_INDIVIDUAL
    value: "individual-delete-individual"
  - name: PUBSUB_TOPIC_UPSERT_CONFIG
    value: "individual-upsert-config"
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: "account-migration"
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: "filesystem:/opt/digit/db/migrations"
  - name: MIGRATION_SCRIPT_PATH
    value: "/opt/digit/migrate.sh"
  - name: MIGRATION_FLYWAY_BIN
    value: "/opt/flyway/flyway"
  - name: MIGRATION_SCHEMA_TABLE
    value: "individual_schema"
  - name: OTEL_TRACES_EXPORTER
    value: "none"
