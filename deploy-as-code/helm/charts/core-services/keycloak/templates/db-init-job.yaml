apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-db-init
  namespace: {{ .Values.namespace }}
  labels:
    app: keycloak
    component: db-init
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: postgres:14-alpine
          command:
            - sh
            - -c
            - |
              PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USERNAME -d postgres -tc \
                "SELECT 1 FROM pg_database WHERE datname = '{{ .Values.db.database }}'" | grep -q 1 || \
              PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USERNAME -d postgres -c \
                "CREATE DATABASE {{ .Values.db.database }}"
          env:
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db
                  key: password
  backoffLimit: 3
