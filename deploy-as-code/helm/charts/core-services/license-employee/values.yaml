# Common Labels
labels:
  app: "license-employee"
  group: "web"

# Ingress Configs
ingress:
  enabled: true
  zuul: false
  context: "license/employee"

# Init Containers Configs
initContainers: {}

# Container Configs
image:
  repository: "license-employee"
  tag: "latest"
replicas: "1"
httpPort: 80
healthChecks:
  enabled: true
  livenessProbePath: "/license-employee/health"
  readinessProbePath: "/license-employee/health"

# Additional Container Envs
env: |
  - name: API_PROXY_TARGET
    value: "https://digit-lts.digit.org/license"
  - name: ACCESS_PROXY_TARGET
    value: "https://digit-lts.digit.org/license"
  - name: CERTIFICATE_PROXY_TARGET
    value: "https://digit-lts.digit.org/license"
  - name: KEYCLOAK_PROXY_TARGET
    value: "https://digit-lts.digit.org/license"

resources: |
  requests:
    cpu: "100m"
    memory: "300Mi"
  limits:
    cpu: "300m"
    memory: "800Mi"
