# Common Labels
labels:
  app: "localization"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "localization"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "localization_schema"
    image:
      repository: "localization-db"
    env: |
      - name: DB_URL
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: db-url
      - name: SCHEMA_TABLE
        value: "localization_schema"
      - name: FLYWAY_USER
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-username
      - name: FLYWAY_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-password
      - name: JAVA_ENABLE_DEBUG
        value: "TRUE"
      - name: FLYWAY_LOCATIONS
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: flyway-locations
      - name: FLYWAY_SCHEMAS
        value: "public"
      - name: FLYWAY_DEFAULT_SCHEMA
        value: "public"

# Container Configs
image:
  repository: "localization"
replicas: 1
appType: "go"
tracing-enabled: false # Assuming you want to keep tracing
healthChecks:
  enabled: false # Disabled as requested
  livenessProbePath: "/health"
  readinessProbePath: "/health"
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"
      
# Additional Container Envs
env: |
  - name: REST_PORT
    value: "8080"
  - name: GRPC_PORT
    value: "8089"
  - name: SERVER_CONTEXT_PATH
    value: "/localization"
  - name: DB_HOST
    value: "postgresql-lts.egov"
  - name: DB_PORT
    value: "5432"
  - name: DB_SSL_MODE
    value: "disable"
  - name: DB_NAME
    value: "postgres"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: DB_MAX_OPEN_CONNS
    value: "100"
  - name: DB_MAX_IDLE_CONNS
    value: "50"
  - name: DB_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_HOST
    value: "redis.backbone"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    value: ""
  - name: REDIS_DB
    value: "0"
  - name: REDIS_ADDRESS
    value: "redis.backbone.svc.cluster.local:6379"
  - name: CACHE_EXPIRATION
    value: "24h"
  - name: OTEL_ENABLED
    value: "false"
  - name: OTEL_SERVICE_NAME
    value: "localization-service"
  - name: OTEL_SERVICE_VERSION
    value: "1.0.0"
  - name: OTEL_EXPORTER_TYPE
    value: "otlp"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "jaeger-collector.tracing:4318"
  - name: OTEL_TRACES_EXPORTER
    value: "otlp"
  - name: OTEL_METRICS_EXPORTER
    value: "otlp"
  - name: OTEL_SAMPLING_RATIO
    value: "1.0"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "1.0"
  - name: JAEGER_SAMPLER_PARAM
    value: "1"
  - name: JAEGER_SAMPLER_TYPE
    value: "remote"
  - name: JAEGER_AGENT_HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: JAEGER_AGENT_PORT
    value: "6831"
  - name: JAEGER_SAMPLER_MANAGER_HOST_PORT
    value: "$(JAEGER_AGENT_HOST):5778"
  - name: TRACER_OPENTRACING_ENABLED
    value: "false"
  - name: GRPC_REFLECTION_ENABLED
    value: "true"
  - name: LOG_LEVEL
    value: "info"
  - name: CONSOLE_LOGS_ENABLED
    value: "true"
  - name: PUBSUB_ENABLED
    value: "false"
  - name: PUBSUB_TYPE
    value: "kafka"
  - name: PUBSUB_TOPIC_CREATE_MESSAGE
    value: "localization-create-message"
  - name: PUBSUB_TOPIC_UPDATE_MESSAGE
    value: "localization-update-message"
  - name: PUBSUB_TOPIC_UPSERT_MESSAGE
    value: "localization-upsert-message"
  - name: PUBSUB_TOPIC_DELETE_MESSAGE
    value: "localization-delete-message"
  - name: KAFKA_BROKERS
    value: "localhost:9092"
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: "localization-service"
  - name: REDIS_CONSUMER_GROUP
    value: "localization-service"
  - name: REDIS_CONSUMER_ID
    value: "localization-service-1"
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "3600"
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: "account-migration"
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: "filesystem:/opt/digit/db/migrations"
  - name: MIGRATION_SCRIPT_PATH
    value: "/opt/digit/migrate.sh"
  - name: MIGRATION_FLYWAY_BIN
    value: "/opt/flyway/flyway"
  - name: MIGRATION_SCHEMA_TABLE
    value: "localization_schema"
