# Common Labels
labels:
  app: "pdf-v3"
  group: "rainmaker"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "pdf-v3"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "pdf_v3_schema"
    image:
      repository: "pdf-v3-db"

# Container Configs
image:
  repository: "pdf-v3"
replicas: "1"
appType: "java-spring"
heap: "-Xmx256m -Xms256m"
memory_limits: 512Mi

# Additional Container Envs
env: ""
