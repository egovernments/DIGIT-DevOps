# Common Labels
labels:
  app: "registry"
  group: "rainmaker"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "registry"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true  # We handle migrations in the app
    schemaTable: registry_schema
    image:
      repository: "registry-db"
    env: |
        - name: "DB_URL"
          valueFrom:
            configMapKeyRef:
              name: egov-config
              key: db-url
        - name: "SCHEMA_TABLE"
          value: {{ .Values.initContainers.dbMigration.schemaTable | quote }}
        - name: "FLYWAY_USER"
          valueFrom:
            secretKeyRef:
              name: db
              key: flyway-username
        - name: "FLYWAY_PASSWORD"
          valueFrom:
            secretKeyRef:
              name: db
              key: flyway-password
        - name: JAVA_ENABLE_DEBUG
          value: "TRUE"
        - name: "FLYWAY_LOCATIONS"
          valueFrom:
            configMapKeyRef:
              name: egov-config
              key: flyway-locations
        - name: FLYWAY_SCHEMAS
          value: public
        - name: FLYWAY_DEFAULT_SCHEMA
          value: public


# Container Configs
image:
  repository: "registry"
replicas: "1"
appType: "go"
tracing-enabled: false
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# Additional Container Envs
env: |
  - name: PORT
    value: "8080"
  - name: DB_HOST
    value: postgresql-lts.egov
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: postgres
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        key: username
        name: db
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        key: password
        name: db
  - name: DB_SSL_MODE
    value: disable
  - name: RUN_MIGRATIONS
    value: "true"
  - name: MIGRATION_PATH
    value: db/migration
  - name: MIGRATION_TIMEOUT
    value: 300s
  - name: VAULT_REQUIRED
    value: "false"
  - name: VAULT_TRANSIT_MOUNT
    value: transit
  - name: VAULT_KEY_PREFIX
    value: registry-
  - name: VAULT_TIMEOUT
    value: 30s
  - name: LOG_LEVEL
    value: info
  - name: GIN_MODE
    value: release
  - name: PUBSUB_ENABLED
    value: "false"
  - name: PUBSUB_TYPE
    value: kafka
  - name: KAFKA_BROKERS
    valueFrom:
      configMapKeyRef:
        key: kafka-brokers
        name: egov-config
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: registry-service
  - name: REDIS_ADDRESS
    value: redis.backbone.svc.cluster.local:6379
  - name: REDIS_PASSWORD
  - name: REDIS_DB
    value: "0"
  - name: REDIS_CONSUMER_GROUP
    value: registry-service
  - name: REDIS_CONSUMER_ID
    value: registry-service-1
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "86400"
  - name: OTEL_ENABLED
    value: "false"
  - name: OTEL_METRICS_ENABLED
    value: "false"
  - name: OTEL_SERVICE_NAME
    value: registry
  - name: OTEL_SERVICE_VERSION
    value: 1.0.0
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: open-telemetry-opentelemetry-collector.monitoring.svc.cluster.local:4318
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "1.0"
  - name: PROMETHEUS_PORT
    value: "9090"
  - name: IDGEN_BASE_URL
    value: http://idgen.egov.svc.cluster.local:8080/idgen
  - name: IDGEN_TEMPLATE_ID
    value: registryId
  - name: IDGEN_ORG_VALUE
    value: REGISTRY
  - name: IDGEN_HTTP_TIMEOUT
    value: 5s
  - name: OTEL_TRACES_EXPORTER
    value: none
  - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
    value: org.postgresql.Driver
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: account-migration
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: filesystem:/opt/digit/db/migrations
  - name: MIGRATION_SCRIPT_PATH
    value: /opt/digit/migrate.sh
  - name: MIGRATION_FLYWAY_BIN
    value: /opt/flyway/flyway
  - name: MIGRATION_SCHEMA_TABLE
    value: registry_schema
  - name: IDGEN_TABLE_TEMPLATES
    value: idgen_templates
  - name: IDGEN_TABLE_SEQUENCE_LOOKUPS
    value: idgen_sequence_lookup
  - name: IDGEN_TABLE_SEQUENCE_RESETS
    value: idgen_sequence_resets
