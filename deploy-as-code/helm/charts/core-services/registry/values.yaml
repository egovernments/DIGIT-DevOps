# Common Labels
labels:
  app: "registry"
  group: "rainmaker"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "registry"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "registry_schema"
    image:
      repository: "registry-db"
    env: |
      - name: DB_URL
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: db-url
      - name: SCHEMA_TABLE
        value: "registry_schema"
      - name: FLYWAY_USER
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-username
      - name: FLYWAY_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db
            key: flyway-password
      - name: JAVA_ENABLE_DEBUG
        value: "TRUE"
      - name: FLYWAY_LOCATIONS
        valueFrom:
          configMapKeyRef:
            name: egov-config
            key: flyway-locations
      - name: FLYWAY_SCHEMAS
        value: "public"
      - name: FLYWAY_DEFAULT_SCHEMA
        value: "public"

# Container Configs
image:
  repository: "registry"
replicas: 1
appType: "go"
tracing-enabled: false
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# Additional Container Envs
env: |
  - name: PORT
    value: "8080"
  - name: DB_HOST
    value: "postgresql-lts.egov"
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "postgres"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: DB_SSL_MODE
    value: "disable"
  - name: RUN_MIGRATIONS
    value: "true"
  - name: MIGRATION_PATH
    value: "db/migration"
  - name: MIGRATION_TIMEOUT
    value: "300s"
  - name: VAULT_REQUIRED
    value: "false"
  - name: VAULT_ADDRESS
    value: ""
  - name: VAULT_TOKEN
    value: ""
  - name: VAULT_TRANSIT_MOUNT
    value: "transit"
  - name: VAULT_KEY_PREFIX
    value: "registry-"
  - name: VAULT_TIMEOUT
    value: "30s"
  - name: LOG_LEVEL
    value: "info"
  - name: GIN_MODE
    value: "release"
  - name: IDGEN_BASE_URL
    value: "http://idgen.egov.svc.cluster.local:8080/idgen"
  - name: IDGEN_TEMPLATE_ID
    value: "registryId"
  - name: IDGEN_ORG_VALUE
    value: "REGISTRY"
  - name: IDGEN_HTTP_TIMEOUT
    value: "5s"
  - name: REGISTRY_DISCOVERY
    value: ""
  - name: REGISTRY_DISCOVERY_FILE
    value: ""
  - name: REGISTRY_DISCOVERY_KEYS
    value: ""
  - name: ASYNC_PERSISTENCE_ENABLED
    value: "false"
  - name: ASYNC_PERSISTENCE_BACKEND
    value: ""
  - name: ASYNC_PERSISTENCE_TOPIC
    value: "registry.persistence"
  - name: ASYNC_KAFKA_BROKERS
    value: ""
  - name: ASYNC_KAFKA_CONSUMER_GROUP
    value: "registry-persistence-consumer"
  - name: ASYNC_REDIS_ADDRESS
    value: "localhost:6379"
  - name: ASYNC_REDIS_PASSWORD
    value: ""
  - name: ASYNC_REDIS_DB
    value: "0"
  - name: ASYNC_REDIS_CONSUMER_GROUP
    value: "registry-persistence-group"
  - name: ASYNC_REDIS_CONSUMER_ID
    value: "registry-persistence-1"
  - name: VALIDATION_PLUGINS_ENABLED
    value: "false"
  - name: VALIDATION_PLUGIN_DIR
    value: "./plugins"
  - name: VALIDATION_WEBHOOK_ENABLED
    value: "false"
  - name: VALIDATION_WEBHOOK_URL
    value: ""
  - name: VALIDATION_WEBHOOK_METHOD
    value: "POST"
  - name: VALIDATION_WEBHOOK_TIMEOUT
    value: "5s"
  - name: VALIDATION_WEBHOOK_API_KEY
    value: ""
  - name: VALIDATION_WEBHOOK_HEADERS
    value: "{}"
  - name: VALIDATION_WEBHOOK_FAIL_OPEN
    value: "false"
  - name: VALIDATION_WEBHOOK_AUTH_TOKEN
    value: ""
  - name: PUBSUB_ENABLED
    value: "false"
  - name: PUBSUB_TYPE
    value: "kafka"
  - name: PUBSUB_TOPIC_CREATE_EMPLOYEE
    value: "hrms-create-employee"
  - name: PUBSUB_TOPIC_UPDATE_EMPLOYEE
    value: "hrms-update-employee"
  - name: PUBSUB_TOPIC_DELETE_EMPLOYEE
    value: "hrms-delete-employee"
  - name: PUBSUB_TOPIC_CREATE_JURISDICTION
    value: "hrms-create-jurisdiction"
  - name: PUBSUB_TOPIC_UPDATE_JURISDICTION
    value: "hrms-update-jurisdiction"
  - name: KAFKA_BROKERS
    value: "localhost:9092"
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: "hrms-service"
  - name: REDIS_ADDRESS
    value: "localhost:6379"
  - name: REDIS_PASSWORD
    value: ""
  - name: REDIS_DB
    value: "0"
  - name: REDIS_CONSUMER_GROUP
    value: "hrms-service"
  - name: REDIS_CONSUMER_ID
    value: "hrms-service-1"
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "3600"
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: "account-migration"
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: "filesystem:/opt/digit/db/migrations"
  - name: MIGRATION_SCRIPT_PATH
    value: "/opt/digit/migrate.sh"
  - name: MIGRATION_FLYWAY_BIN
    value: "/opt/flyway/flyway"
  - name: MIGRATION_SCHEMA_TABLE
    value: "registry_schema"
  - name: OTEL_TRACES_EXPORTER
    value: "none"