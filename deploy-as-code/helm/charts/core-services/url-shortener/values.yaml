# Common Labels
labels:
  app: "url-shortener"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "url-shortener"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "url_shortener_schema"
    image:
      repository: "url-shortener-db"

# Container Configs
image:
  repository: "url-shortener"
replicas: 1
appType: "go"
tracing-enabled: true # Assuming you want to keep tracing
healthChecks:
  enabled: false # Disabled as requested
  livenessProbePath: "/health"
  readinessProbePath: "/health"
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# Additional Container Envs
env: |
  - name: HTTP_PORT
    value: "8080"
  - name: SERVER_CONTEXT_PATH
    value: "/url-shortener"
  - name: DB_HOST
    value: "postgresql-lts.egov"
  - name: DB_PORT
    value: "5432"
  - name: DB_SSL_MODE
    value: "disable"
  - name: DB_NAME
    value: "postgres"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: CACHE_ENABLED
    value: "false"
  - name: CACHE_TYPE
    value: "redis"
  - name: CACHE_TTL
    value: "24*time.Hour"
  - name: REDIS_ADDR
    value: "redis.backbone:6379"
  - name: REDIS_DB
    value: "0"
  - name: SERVER_HOST_NAME
    value: "https://digit-lts.digit.org"
  - name: PUBSUB_ENABLED
    value: "false"
  - name: PUBSUB_TYPE
    value: redis
  - name: KAFKA_BROKERS
    value: release-name-kafka-controller-headless.kafka-kraft:9092
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: url-shortener-service
  - name: REDIS_ADDRESS
    value: redis.backbone.svc.cluster.local:6379
  - name: REDIS_DB
    value: "0"
  - name: REDIS_CONSUMER_GROUP
    value: url-shortener-service
  - name: REDIS_CONSUMER_ID
    value: url-shortener-service-1
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "86400"
  - name: PUBSUB_TOPIC_CREATE_SHORT_URL
    value: url-shortener-create-short-url
  - name: PUBSUB_TOPIC_CREATE_URL_CONFIG
    value: url-shortener-create-url-config
  - name: PUBSUB_TOPIC_UPDATE_URL_CONFIG
    value: url-shortener-update-url-config
  - name: PUBSUB_TOPIC_DELETE_URL_CONFIG
    value: url-shortener-delete-url-config
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: account-migration
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: filesystem:/opt/digit/db/migrations
  - name: MIGRATION_SCRIPT_PATH
    value: /opt/digit/migrate.sh
  - name: MIGRATION_FLYWAY_BIN
    value: /opt/flyway/flyway
  - name: MIGRATION_SCHEMA_TABLE
    value: employee_schema
  - name: JAEGER_SAMPLER_PARAM
    value: "1" 
  - name: OTEL_TRACES_EXPORTER
    value: "none"
  - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
    value: "org.postgresql.Driver"
