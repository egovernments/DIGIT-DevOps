# Common Labels
labels:
  app: "employee"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "employee"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "employee_schema"
    image:
      repository: "employee-db"

# Container Configs
image:
  repository: "employee"
replicas: 1
appType: "go"
tracing-enabled: true # Assuming you want to keep tracing
healthChecks:
  enabled: false # Disabled as requested
  livenessProbePath: "/health"
  readinessProbePath: "/health"
# Resource configuration for Go service
resources: |
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

# Additional Container Envs
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: SERVER_CONTEXT_PATH
    value: "/employee"
  - name: DB_HOST
    value: "postgresql-lts.egov"
  - name: DB_PORT
    value: "5432"
  - name: DB_SSL_MODE
    value: "disable"
  - name: DB_NAME
    value: "postgres"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password

  - name: IDGEN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: idgen
  - name: IDGEN_PATH
    value: "idgen/v1/generate"
  - name: IDGEN_NAME
    value: "employee.idgen"

  - name: BOUNDARY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: boundary
  - name: BOUNDARY_ENABLED
    value: "true"  

  - name: INDIVIDUAL_HOST
    value: "http://individual:8080/"
  - name: INDIVIDUAL_ENABLED
    value: "true"

  - name: KEYCLOAK_BASE_URL
    value: "http://keycloak.keycloak.svc.cluster.local:8080/keycloak"
  - name: KEYCLOAK_ENABLED
    value: "true"
  - name: PUBSUB_ENABLED
    value: "true"
  - name: PUBSUB_TYPE
    value: redis
  - name: KAFKA_BROKERS
    value: release-name-kafka-controller-headless.kafka-kraft:9092
  - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
    value: "true"
  - name: KAFKA_PARTITION_COUNT
    value: "1"
  - name: KAFKA_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_CONSUMER_GROUP
    value: employee-service
  - name: REDIS_ADDRESS
    value: redis.backbone.svc.cluster.local:6379
  - name: REDIS_PASSWORD
  - name: REDIS_DB
    value: "0"
  - name: REDIS_CONSUMER_GROUP
    value: employee-service
  - name: REDIS_CONSUMER_ID
    value: employee-service-1
  - name: REDIS_RETENTION_DAYS
    value: "7"
  - name: REDIS_MAX_STREAM_LENGTH
    value: "1000000"
  - name: REDIS_CLEANUP_INTERVAL
    value: "86400"
  - name: PUBSUB_TOPIC_CREATE_EMPLOYEE
    value: employee-create-employee
  - name: PUBSUB_TOPIC_UPDATE_EMPLOYEE
    value: employee-update-employee
  - name: PUBSUB_TOPIC_DELETE_EMPLOYEE
    value: employee-delete-employee
  - name: PUBSUB_TOPIC_CREATE_JURISDICTION
    value: employee-create-jurisdiction
  - name: PUBSUB_TOPIC_UPDATE_JURISDICTION
    value: employee-update-jurisdiction
  - name: SCHEMA_SEPARATION_MODE
    value: "false"
  - name: SCHEMA_SEPARATION_TOPIC
    value: account-migration
  - name: MIGRATION_FLYWAY_LOCATIONS
    value: filesystem:/opt/digit/db/migrations
  - name: MIGRATION_SCRIPT_PATH
    value: /opt/digit/migrate.sh
  - name: MIGRATION_FLYWAY_BIN
    value: /opt/flyway/flyway
  - name: MIGRATION_SCHEMA_TABLE
    value: employee_schema




