# Common Labels
labels:
  app: "digit-ui-sso"
  group: "web"

namespace: health

# Ingress Configs
ingress:
  enabled: true
  context: "digit-ui-sso"

# Init Containers Configs
initContainers: {}

# Container Configs
image:
  repository: "digit-ui-sso"
replicas: "1"
httpPort: 80
healthChecks:
  enabled: true
  livenessProbePath: "/digit-ui-sso/"
  readinessProbePath: "/digit-ui-sso/"
  
env: |
  - name: SERVER_CONTEXT_PATH
    value: /digit-ui-sso
extraVolumes: |
  - name: js-injection
    configMap:
      name: digit-ui-sso-js-injection
extraVolumeMounts: |
  - mountPath: /etc/nginx/conf.d/sub_filter.conf
    name: js-injection
    subPath: sub_filter.conf
