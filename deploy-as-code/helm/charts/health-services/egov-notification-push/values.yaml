# Common Labels
labels:
  app: "egov-notification-push"
  group: "health"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "egov-notification-push"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "push_notification_schema_version"
    image:
      repository: "egov-notification-push-db"

# Container Configs
image:
  repository: "egov-notification-push"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/egov-notification-push/health"
  readinessProbePath: "/egov-notification-push/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx192m -Xms192m"
java-args: ""

# Additional Container Envs
env: |
  - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    value: egov-notification-push-group
  - name: SPRING_KAFKA_PRODUCER_KEY_SERIALIZER
    value: org.apache.kafka.common.serialization.StringSerializer
  {{- if index .Values "global" "tracer-errors-provideexceptionindetails" }}
  - name: TRACER_ERRORS_PROVIDEEXCEPTIONINDETAILS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: tracer-errors-provideexceptionindetails
  {{- end }}
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: JAVA_ENABLE_DEBUG
    value: {{ index .Values "java-enable-debug" | quote }}
  - name: SERVER_PORT
    value: "8080"
  - name: SECURITY_BASIC_ENABLED
    value: "false"
  - name: MANAGEMENT_SECURITY_ENABLED
    value: "false"
  {{- if index .Values "tracing-enabled" }}
  - name: TRACER_OPENTRACING_ENABLED
    value: "true"
  {{- end }}
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/egov-notification-push"
  - name: KAFKA_TOPICS_NOTIFICATION_PUSH
    value: "egov.core.notification.push"
  - name: KAFKA_TOPICS_PERSISTER_SAVE_DEVICE_TOKEN
    value: "save-push-device-token"
  - name: KAFKA_TOPICS_PERSISTER_DELETE_DEVICE_TOKEN
    value: "delete-push-device-token"
  - name: KAFKA_TOPICS_PERSISTER_UNREGISTER_DEVICE_TOKEN
    value: "unregister-push-device-token"
  - name: FCM_ENABLED
    value: "true"
  - name: FCM_SERVICE_ACCOUNT_KEY_JSON                                                                                                                                                                                   
    valueFrom:
      secretKeyRef:
        name: egov-notification-push                                                                                                                                                                                       
        key: fcm-service-account-key-json
  - name: FCM_BATCH_SIZE
    value: "500"
  - name: STATE_LEVEL_TENANT_ID
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: egov-state-level-tenant-id
  - name: STATE_LEVEL_TENANTID_LENGTH
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: state-level-tenantid-length
  - name: STATE_SCHEMA_INDEX_POSITION_TENANTID
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: state-schema-index-position-tenantid
  - name: KAFKA_TENANT_ID_PATTERN
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-tenant-id-pattern
  - name: TRACER_KAFKAMESSAGELOGGINGENABLED
    value: "true"
  - name: TRACER_ERRORSTOPIC
    value: "notification-push-deadletter"