# Common Labels
labels:
  app: "excel-ingestion"
  group: "health"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "excel-ingestion"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "excel_ingestion_flyway_history"
    image:
      repository: "excel-ingestion-db"

# Container Configs
image:
  repository: "excel-ingestion"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/excel-ingestion/health"
  readinessProbePath: "/excel-ingestion/health"
appType: "java-spring"
tracing-enabled: true
kafka-mdc-enabled: "true"
memory_limits: "3072Mi"
cpu_limits: "500m"
heap: "-Xmx2900m -Xms256m -XX:+ExitOnOutOfMemoryError"
java-args: ""
egov-mdms-service-host-key: "egov-mdms-service"
egov-mdms-service-endpoint-key: "egov-mdms-service/v2/_search"
defaultLocale: "en_IN"
java-enable-debug: false
java-debug-port: 5005
egov-hrms-employee-search-path: "health-hrms/employees/_search"
egov-hrms-employee-search-parallel-calls: "100"
egov-worker-registry-search-path: "worker/v1/_search"
egov-worker-registry-search-batch-size: "100"
egov-attendance-attendee-search-path: "health-attendance/attendee/v1/_search"
egov-attendance-attendee-search-page-size: "100"
egov-attendance-staff-search-path: "health-attendance/staff/v1/_search"
egov-attendance-staff-search-page-size: "100"
egov-attendance-register-search-batch-size: "100"
egov-attendance-register-search-parallel-calls: "10"
excel-row-limit: "5000"
excel-sheet-name-max-length: "31"
egov-excel-sheet-password: "passwordhere"
egov-excel-sheet-zoom: "90"
egov-excel-validation-error-color: "#ff0000"

# Additional Container Envs
env: |
  - name: TRACER_KAFKA_MDC_ENABLED
    value: {{ index .Values "kafka-mdc-enabled" | quote }}
  - name: JAVA_TOOL_OPTIONS
    value: "-Xmx2500m -Xms256m -XX:+ExitOnOutOfMemoryError"
  - name: SERVER_PORT
    value: "8080"
  - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    value: {{ index .Values "group-id" | default "excel-ingestion" }}
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/excel-ingestion"
  - name: EGOV_BOUNDARY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: boundary-service
  - name: EGOV_FILESTORE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-filestore
  - name: EGOV_CAMPAIGN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: project-factory
  - name: EGOV_HEALTH_INDIVIDUAL_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-individual
  - name: EGOV_FACILITY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: facility
  - name: EGOV_LOCALIZATION_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-localization
  - name: EGOV_MDMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: {{ index .Values "egov-mdms-service-host-key" | quote }}

  - name: EGOV_HRMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-hrms
  - name: EGOV_HRMS_EMPLOYEE_SEARCH_PATH
    value: "health-hrms/employees/_search"
  - name: EGOV_HRMS_EMPLOYEE_SEARCH_PARALLEL_CALLS
    value: "100"

  - name: EGOV_ATTENDANCE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-attendance
  - name: EGOV_ATTENDANCE_REGISTER_SEARCH_PATH
    value: "health-attendance/v1/_search"
  - name: EGOV_ATTENDANCE_REGISTER_SEARCH_BATCH_SIZE
    value: "100"
  - name: EGOV_ATTENDANCE_REGISTER_SEARCH_PARALLEL_CALLS
    value: "10"
  - name: EGOV_ATTENDANCE_ATTENDEE_SEARCH_PATH
    value: "health-attendance/attendee/v1/_search"
  - name: EGOV_ATTENDANCE_ATTENDEE_SEARCH_PAGE_SIZE
    value: "100"
  - name: EGOV_ATTENDANCE_STAFF_SEARCH_PATH
    value: "health-attendance/staff/v1/_search"
  - name: EGOV_ATTENDANCE_STAFF_SEARCH_PAGE_SIZE
    value: "100"


  - name: EGOV_WORKER_REGISTRY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: worker-registry-host
  - name: EGOV_WORKER_REGISTRY_SEARCH_PATH
    value: "worker/v1/_search"
  - name: EGOV_WORKER_REGISTRY_SEARCH_BATCH_SIZE
    value: "100"

  - name: EXCEL_SHEET_NAME_MAX_LENGTH
    value: "31"
  - name: EXCEL_ROW_LIMIT
    value: {{ index .Values "excel-row-limit" | default "5000" | quote }}
  - name: EGOV_EXCEL_SHEET_PASSWORD
    value: {{ index .Values "egov-excel-sheet-password" | default "passwordhere" | quote }}
  - name: EGOV_EXCEL_SHEET_ZOOM
    value: {{ index .Values "egov-excel-sheet-zoom" | default "90" | quote }}
  - name: EGOV_EXCEL_VALIDATION_ERROR_COLOR
    value: {{ index .Values "egov-excel-validation-error-color" | default "#ff0000" | quote }}
  - name: EGOV_CAMPAIGN_DATA_SEARCH_PATH
    value: "project-factory/v1/data/campaign/_search"
  - name: EGOV_CAMPAIGN_CRYPTO_BULK_DECRYPT_PATH
    value: "project-factory/v1/crypto/_bulkDecrypt"
  - name: EGOV_HEALTH_INDIVIDUAL_SEARCH_PATH
    value: "health-individual/v1/_search"
  - name: EGOV_HIERARCHY_SEARCH_URL
    value: "boundary-service/boundary-hierarchy-definition/_search"
  - name: EGOV_BOUNDARY_RELATIONSHIP_SEARCH_URL
    value: "boundary-service/boundary-relationships/_search"
  - name: EGOV_FACILITY_SEARCH_PATH
    value: "facility/v1/_search"
  - name: EGOV_FILESTORE_UPLOAD_ENDPOINT
    value: "filestore/v1/files"
  - name: EGOV_FILESTORE_URL_ENDPOINT
    value: "filestore/v1/files/url"
  - name: EGOV_LOCALIZATION_SEARCH_PATH
    value: "localization/messages/v1/_search"
  - name: EGOV_MDMS_SEARCH_PATH
    value: {{ index .Values "egov-mdms-service-endpoint-key" | quote }}

  - name: DEFAULT_LOCALE
    value: {{ index .Values "defaultLocale" | quote }}
  - name: MANAGEMENT_HEALTH_REDIS_ENABLED
    value: "false"
  
  - name: SPRING_DATASOURCE_URL
  {{- if eq .Values.namespace "health" }}
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: health-db-url
  {{- else }}
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-url
  {{- end }}
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
    value: "org.postgresql.Driver"

  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-host
  - name: DB_NAME
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-name
  - name: DB_PORT
    value: "5432"
  - name: DB_SCHEMA
    value: {{ .Values.namespace | default "public" }}
  
  # JPA/Hibernate Configuration
  - name: SPRING_JPA_HIBERNATE_DDL_AUTO
    value: "update"
  - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
    value: "org.hibernate.dialect.PostgreSQLDialect"
  - name: EXCEL_INGESTION_GENERATION_SAVE_TOPIC
    value: {{ index .Values "excel-ingestion-generation-save-topic" | default "save-generated-file" | quote }}
  - name: EXCEL_INGESTION_GENERATION_UPDATE_TOPIC
    value: {{ index .Values "excel-ingestion-generation-update-topic" | default "update-generated-file" | quote }}
  - name: EXCEL_INGESTION_PROCESSING_SAVE_TOPIC
    value: {{ index .Values "excel-ingestion-processing-save-topic" | default "save-processing-file" | quote }}
  - name: EXCEL_INGESTION_PROCESSING_UPDATE_TOPIC
    value: {{ index .Values "excel-ingestion-processing-update-topic" | default "update-processing-file" | quote }}
  - name: EXCEL_INGESTION_SHEET_DATA_SAVE_TOPIC
    value: {{ index .Values "excel-ingestion-sheet-data-save-topic" | default "save-sheet-data-temp" | quote }}
  - name: EXCEL_INGESTION_SHEET_DATA_DELETE_TOPIC
    value: {{ index .Values "excel-ingestion-sheet-data-delete-topic" | default "delete-sheet-data-temp" | quote }}
  - name: EXCEL_INGESTION_PROCESSING_RESULT_TOPIC
    value: {{ index .Values "excel-ingestion-processing-result-topic" | default "hcm-processing-result" | quote }}
  - name: EXCEL_INGESTION_GENERATION_INIT_TOPIC
    value: {{ index .Values "excel-ingestion-generation-init-topic" | default "excel-ingestion-generation-init" | quote }}
  - name: KAFKA_TENANT_ID_PATTERN
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-tenant-id-pattern

  # Kafka consumer tuning for the generation init listener (max.poll.records is
  # pinned to 1 in code; do not expose).
  - name: SPRING_KAFKA_CONSUMER_PROPERTIES_MAX_POLL_INTERVAL_MS
    value: {{ index .Values "excel-ingestion-consumer-max-poll-interval-ms" | default "900000" | quote }}
  - name: SPRING_KAFKA_CONSUMER_PROPERTIES_SESSION_TIMEOUT_MS
    value: {{ index .Values "excel-ingestion-consumer-session-timeout-ms" | default "120000" | quote }}
  - name: EXCEL_INGESTION_GENERATION_ROW_WAIT_TIMEOUT_MS
    value: {{ index .Values "excel-ingestion-generation-row-wait-timeout-ms" | default "10000" | quote }}
  # Flyway Configuration
  - name: FLYWAY_USER
    valueFrom:
      secretKeyRef:
        name: db
        key: flyway-username
  - name: FLYWAY_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: flyway-password
  - name: FLYWAY_LOCATIONS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: flyway-locations
  - name: SCHEMA_TABLE
    value: {{ .Values.initContainers.dbMigration.schemaTable | quote }}
  
  {{- if index .Values "global" "tracer-errors-provideexceptionindetails" }}
  - name: TRACER_ERRORS_PROVIDEEXCEPTIONINDETAILS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: tracer-errors-provideexceptionindetails
  {{- end }}
  {{- if index .Values "java-debug-port" }}
  - name: JAVA_DEBUG_PORT
    value: {{ index .Values "java-debug-port" | quote }}
  {{- end }}
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}

  # Kafka Producer Configs
  - name: SPRING_KAFKA_PRODUCER_KEY_SERIALIZER
    value: org.apache.kafka.common.serialization.StringSerializer
  - name: SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER
    value: org.springframework.kafka.support.serializer.JsonSerializer
