# Common Labels
labels:
  app: "fhir-supplychain-transformer"
  group: "health"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "fhir-supplychain-transformer"

# Container Configs
image:
  repository: "fhir-supplychain-transformer"
replicas: 1
healthChecks:
  enabled: true
  livenessProbePath: "/fhir-supplychain-transformer/fhir-api/health"
  readinessProbePath: "/fhir-supplychain-transformer/fhir-api/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx256m -Xms256m"
java-args: ""
memory_limits: "512Mi"

# Additional Container Envs
env: |
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/fhir-supplychain-transformer"
  - name: SERVER_PORT
    value: "8080"
  - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    value: fhir-supplychain-transformer
  - name: SPRING_KAFKA_PRODUCER_KEY_SERIALIZER
    value: org.apache.kafka.common.serialization.StringSerializer
  {{- if index .Values "global" "tracer-errors-provideexceptionindetails" }}
  - name: TRACER_ERRORS_PROVIDEEXCEPTIONINDETAILS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: tracer-errors-provideexceptionindetails
  {{- end }}
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: SECURITY_BASIC_ENABLED
    value: "false"
  - name: MANAGEMENT_SECURITY_ENABLED
    value: "false"
  - name: KAFKA_DLQ_TOPIC
    value: "fhir.dlq"
  - name: KAFKA_FAILED_TOPIC
    value: "fhir.resource.failed"
  - name: APP_TENANTID
    value: "default"
  - name: FHIR_DEFAULT_USER_UUID
    value: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  - name: FACILITY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: facility
  - name: FACILITY_SEARCH_ENDPOINT
    value: "/facility/v1/_search"
  - name: FACILITY_CREATE_ENDPOINT
    value: "/facility/v1/bulk/_create"
  - name: FACILITY_UPDATE_ENDPOINT
    value: "/facility/v1/bulk/_update"
  - name: PRODUCT_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: product
  - name: PRODUCT_VARIANT_SEARCH_ENDPOINT
    value: "/product/variant/v1/_search"
  - name: PRODUCT_VARIANT_CREATE_ENDPOINT
    value: "/product/variant/v1/_create"
  - name: PRODUCT_VARIANT_UPDATE_ENDPOINT
    value: "/product/variant/v1/_update"
  - name: STOCK_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: stock
  - name: STOCK_SEARCH_ENDPOINT
    value: "/stock/v1/_search"
  - name: STOCK_CREATE_ENDPOINT
    value: "/stock/v1/bulk/_create"
  - name: STOCK_UPDATE_ENDPOINT
    value: "/stock/v1/bulk/_update"
  - name: STOCK_RECONCILIATION_SEARCH_ENDPOINT
    value: "/stock/reconciliation/v1/_search"
  - name: STOCK_RECON_CREATE_ENDPOINT
    value: "/stock/reconciliation/v1/bulk/_create"
  - name: STOCK_RECON_UPDATE_ENDPOINT
    value: "/stock/reconciliation/v1/bulk/_update"
  - name: BOUNDARY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: boundary-service
  - name: BOUNDARY_RELATIONSHIP_SEARCH_ENDPOINT
    value: "/boundary-service/boundary-relationships/_search"
  - name: BOUNDARY_CREATE_ENDPOINT
    value: "/boundary-service/boundary-relationships/_create"
  - name: BOUNDARY_UPDATE_ENDPOINT
    value: "/boundary-service/boundary-relationships/_update"
  - name: SPRING_REDIS_HOST
    value: redis.backbone
  - name: SPRING_REDIS_PORT
    value: "6379"
