# Common Labels
labels:
  app: "fhiradapter"
  group: "health"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "fhiradapter"

# Container Configs
image:
  repository: "fhiradapter"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/fhiradapter/health"
  readinessProbePath: "/fhiradapter/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx256m -Xms256m"
memory_limits: 512Mi
java-args: ""

# Additional Container Envs
env: |
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/fhiradapter"
  - name: SERVER_PORT
    value: "8080"
  - name: EGOV_BASE_URL
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: egov-services-fqdn-name
  - name: FHIR_MAPPING_PATH
    value: "classpath:mappings/*.json"
  - name: APP_TIMEZONE
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: timezone
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: SECURITY_BASIC_ENABLED
    value: "false"
  - name: MANAGEMENT_SECURITY_ENABLED
    value: "false"
