# Common Labels
labels:
  app: "health-expense"
  group: "health"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "health-expense"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "expense_schema"
    image:
      repository: "health-expense-db"

# Container Configs
image:
  repository: "health-expense"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/health-expense/health"
  readinessProbePath: "/health-expense/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx256m -Xms256m"
memory_limits: 512Mi
java-args: ""
cpu_limits: "300m"

expense-billing-bill-create: expense-bill-create-health
expense-billing-bill-update: expense-bill-update-health
report-generation-trigger-topic: report-generation-trigger

# Additional Container Envs
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: SERVER_CONTEXT_PATH
    value: /health-expense
  - name: SERVER_SERVLET_CONTEXT-PATH
    value: /health-expense
  - name: EGOV_MDMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-mdms-service
  - name: EGOV_IDGEN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-idgen
  - name: EGOV_HRMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-hrms
  - name: EGOV_LOCALIZATION_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-localization
  - name: EGOV_WORKFLOW_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-workflow-v2
  - name: EGOV_URL_SHORTNER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-url-shortening
  - name: EGOV_USER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-user
  - name: EGOV_MDMS_V2_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: mdms-service-v2
  - name: WORKS_INDIVIDUAL_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-individual
  - name: BUSINESS_WORKFLOW_STATUS_MAP
    value: {{ index .Values "business-workflow-status-map" | quote }}
  - name: EXPENSE_BILLING_BILL_CREATE
    value: {{ index .Values "expense-billing-bill-create" | quote }}
  - name: EXPENSE_BILLING_BILL_UPDATE
    value: {{ index .Values "expense-billing-bill-update" | quote }}
  - name: KAFKA_TOPICS_NOTIFICATION_SMS
    value: "egov.core.notification.sms"
  {{- if index .Values "expense-billing-default-offset" }}
  - name: EXPENSE_BILLING_DEFAULT_OFFSET
    value: {{ index .Values "expense-billing-default-offset" | quote }} 
  {{- end }}
  {{- if index .Values "expense-billing-default-limit" }}
  - name: EXPENSE_BILLING_DEFAULT_LIMIT
    value: {{ index .Values "expense-billing-default-limit" | quote }} 
  {{- end }}
  {{- if index .Values "expense-billing-search-max-limit" }}
  - name: EXPENSE_BILLING_SEARCH_MAX_LIMIT
    value: {{ index .Values "expense-billing-search-max-limit" | quote }} 
  {{- end }}
  - name: WORKS_PROJECT_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-project
  - name: WORKS_PROJECT_STAFF_ENDPOINT
    value: "health-project/staff/v1/_search"
  - name: SPRING_DATA_REDIS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: redis-host-worker
  {{- if index .Values "spring-kafka-producer-properties-max-request-size" }}
  - name: SPRING_KAFKA_PRODUCER_PROPERTIES_MAX_REQUEST_SIZE
    value: {{ index .Values "spring-kafka-producer-properties-max-request-size" | quote }} 
  {{- end }}
  {{- if index .Values "egov-mdms-v2-search-endpoint" }}
  - name: EGOV_MDMS_V2_SEARCH_ENDPOINT
    value: {{ index .Values "egov-mdms-v2-search-endpoint" | quote }} 
  {{- end }}
  - name: IS_HEALTH_CONTEXT_ENABLED
    value: "true"
  - name: EXPENSE_V2_PERIODIC_BILLING_ENABLED
    value: {{ index .Values "expense-v2-periodic-billing-enabled" | default "false" | quote }}
  - name: EXPENSE_KAFKA_TENANT_ID_PATTERN
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-tenant-id-pattern
  - name: TASK_SCHEDULER-BOOTSTRAP_TENANTS
    value: {{ index .Values "task-scheduler-bootstrap-tenants" | default "dev" | quote}}
  - name: TASK_SCHEDULER_BOOTSTRAP_TENANTS
    value: {{ index .Values "task-scheduler-bootstrap-tenants" | default "dev" | quote}}
  - name: WORKS_WORKER_REGISTRY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: worker-registry-host
  - name: WORKS_WORKER_REGISTRY_ENDPOINT
    value: "/worker/v1/_search"
  - name: WORKS_WORKER_REGISTRY_SEARCH_PAGE_SIZE
    value: "100"
  - name: EGOV_FILESTORE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-filestore
  - name: MTN_API_MOCK_ENABLED
    value: {{ index .Values "mtn-api-mock-enabled" | default "true" | quote }}
  - name: TASK_SCHEDULER_BOOTSTRAP_TENANTS
    value: {{ index .Values "task-scheduler-bootstrap-tenants" | default "dev" | quote}}
  - name: REPORT_GENERATION_TRIGGER_TOPIC
    value: {{ index .Values "report-generation-trigger-topic" | quote}}
  - name: EXPENSE_BILLING_BILL_DETAIL_CREATE
    value: "expense-bill-detail-create"
  - name: EXPENSE_BILLING_BILL_DETAIL_UPDATE
    value: "expense-bill-detail-update"
  - name: EXPENSE_BILL_TASK
    value: "expense-bill-task"
  - name: EXPENSE_BILL_TASK_DETAILS
    value: "expense-bill-task-details"
  - name: EXPENSE_TASK_STATUS_UPDATE
    value: "expense-task-status-update"
  - name: EXPENSE_TASK_DETAILS_UPDATE
    value: "expense-task-details-update"
  - name: EXPENSE_BILLING_PAYMENT_CREATE
    value: "expense-payment-create"
  - name: EXPENSE_BILLING_PAYMENT_UPDATE
    value: "expense-payment-update"
  - name: EGOV_HRMS_SEARCH_ENDPOINT
    value: "/health-hrms/employees/_search"
  - name: WORKS_INDIVIDUAL_ENDPOINT
    value: "/health-individual/v1/_search"
  - name: EGOV_MDMS_SEARCH_ENDPOINT
    value: "egov-mdms-service/v1/_search"
  - name: EGOV_MDMS_V2_SEARCH_V2_ENDPOINT
    value: "egov-mdms-service/v2/_search"
  - name: PROJECT_SERVICE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-project
  - name: PROJECT_SEARCH_PATH
    value: "health-project/v1/_search"
  - name: STATE_SCHEMA_INDEX_POSITION_TENANTID
    value: "0"
