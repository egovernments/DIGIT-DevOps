# Common Labels
labels:
  app: "health-notification-service"
  group: "health"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "health-notification-service"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "health_notification_schema"
    image:
      repository: "health-notification-service-db"

# Container Configs
image:
  repository: "health-notification-service"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/health-notification-service/health"
  readinessProbePath: "/health-notification-service/health"
appType: "java-spring"
tracing-enabled: true
memory_limits: 512Mi
heap: "-Xmx384m -Xms384m"
java-args: ""
egov-mdms-service-host-key: "mdms-service-v2"
egov-mdms-service-endpoint-key: "/mdms-v2/v1/_search"

# Additional Container Envs
env: |
  - name: SPRING_KAFKA_CONSUMER_GROUP_ID
    value: health-notification-service
  - name: SPRING_KAFKA_PRODUCER_KEY_SERIALIZER
    value: org.apache.kafka.common.serialization.StringSerializer
  {{- if index .Values "global" "tracer-errors-provideexceptionindetails" }}
  - name: TRACER_ERRORS_PROVIDEEXCEPTIONINDETAILS
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: tracer-errors-provideexceptionindetails
  {{- end }}
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: SERVER_PORT
    value: "8080"
  - name: SECURITY_BASIC_ENABLED
    value: "false"
  - name: MANAGEMENT_SECURITY_ENABLED
    value: "false"
  - name: SERVER_SERVLET_CONTEXT_PATH
    value: "/health-notification-service"
  - name: EGOV_MDMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: {{ index .Values "egov-mdms-service-host-key" | quote }}
  - name: EGOV_MDMS_SEARCH_ENDPOINT
    value: {{ index .Values "egov-mdms-service-endpoint-key" | quote }}
  - name: EGOV_MDMS_SEARCH_V2_ENDPOINT
    value: "/mdms-v2/v2/_search"
  - name: EGOV_LOCALIZATION_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-localization
  - name: EGOV_LOCALIZATION_CONTEXT_PATH
    value: "localization/messages/v1"
  - name: EGOV_LOCALIZATION_SEARCH_ENDPOINT
    value: "/_search"
  - name: EGOV_LOCALIZATION_STATELEVEL
    value: "true"
  - name: EGOV_LOCALIZATION_NOTIFICATION_MODULE
    value: "health-notification-sms"
  - name: EGOV_LOCALIZATION_SUPPORTED_LOCALES
    value: "en_NG,fr_NG"
  - name: EGOV_HOUSEHOLD_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: household
  - name: EGOV_HOUSEHOLD_SEARCH_URL
    value: "/household/v1/_search"
  - name: EGOV_HOUSEHOLD_MEMBER_SEARCH_URL
    value: "/household/member/v1/_search"
  - name: EGOV_INDIVIDUAL_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-individual
  - name: EGOV_INDIVIDUAL_SEARCH_URL
    value: "/individual/v1/_search"
  - name: EGOV_PROJECT_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: health-project
  - name: EGOV_PROJECT_SEARCH_URL
    value: "/project/v1/_search"
  - name: EGOV_PROJECT_BENEFICIARY_SEARCH_URL
    value: "/project/beneficiary/v1/_search"
  - name: EGOV_ENC_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-enc-service
  - name: EGOV_ENC_ENCRYPT_ENDPOINT
    value: "/egov-enc-service/crypto/v1/_encrypt"
  - name: EGOV_ENC_DECRYPT_ENDPOINT
    value: "/egov-enc-service/crypto/v1/_decrypt"
  - name: EGOV_STOCK_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: stock
  - name: EGOV_STOCK_SEARCH_URL
    value: "/stock/v1/_search"
  - name: EGOV_FACILITY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: facility
  - name: EGOV_FACILITY_SEARCH_URL
    value: "/facility/v1/_search"
  - name: EGOV_PUSH_NOTIFICATION_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-notification-push
  - name: EGOV_PUSH_NOTIFICATION_SEND_URL
    value: "/egov-notification-push/v1/push/_send"
  - name: PROJECT_TASK_CONSUMER_CREATE_TOPIC
    value: "save-project-task-topic"
  - name: KAFKA_TOPICS_NOTIFICATION_SMS
    value: "egov.core.notification.sms"
  - name: KAFKA_TOPICS_NOTIFICATION_PUSH
    value: "egov.core.notification.push"
  - name: SCHEDULED_NOTIFICATION_SAVE_TOPIC
    value: "save-scheduled-notification-topic"
  - name: SCHEDULED_NOTIFICATION_UPDATE_TOPIC
    value: "update-scheduled-notification-topic"
  - name: STOCK_CONSUMER_CREATE_TOPIC
    value: "save-stock-topic"
  - name: STOCK_CONSUMER_UPDATE_TOPIC
    value: "update-stock-topic"
  - name: HFREFERRAL_CONSUMER_CREATE_TOPIC
    value: "save-hfreferral-topic"
  - name: HFREFERRAL_CONSUMER_UPDATE_TOPIC
    value: "update-hfreferral-topic"
  - name: MDMS_NOTIFICATION_MODULE
    value: "HCM-NOTIFICATION-CONFIG"
  - name: MDMS_PROJECT_MODULE
    value: "HCM-PROJECT-TYPES"
  - name: NOTIFICATION_SMS_ENABLED
    value: "true"
  - name: NOTIFICATION_PUSH_ENABLED
    value: "true"
  - name: NOTIFICATION_TIMEZONE
    value: "Africa/Lagos"
  - name: NOTIFICATION_SCHEDULER_ENABLED
    value: "true"
  - name: NOTIFICATION_SCHEDULER_CRON
    value: "0 0 8 * * *"
  - name: NOTIFICATION_SCHEDULER_BATCH_SIZE
    value: "100"
  - name: NOTIFICATION_SCHEDULER_MAX_FETCH
    value: "10000"
  - name: STATE_LEVEL_TENANT_ID
    value: "ba"
  - name: STATE_LEVEL_TENANTID_LENGTH
    value: "1"
  - name: STATE_SCHEMA_INDEX_POSITION_TENANTID
    value: "0"
  - name: IS_ENVIRONMENT_CENTRAL_INSTANCE
    value: "false"