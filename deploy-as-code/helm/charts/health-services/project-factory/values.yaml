# Common Labels
labels:
  app: "project-factory"
  group: "rainmaker"

namespace: health

# Ingress Configs
ingress:
  namespace: egov
  enabled: true
  zuul: true
  context: "project-factory"
  additionalAnnotations: |
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "project_factory_health_schema"
    image:
      repository: "project-factory-db"

# Container Configs
image:
  repository: "project-factory"
replicas: "3"
appType: "java-spring"
tracing-enabled: true
heap: '-Xmx1000m -Xms756m'
memory_limits: '3Gi'
cpu_limits: '2048m'

# Additional Container Envs
env: |
  - name: KAFKA_BROKER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: kafka-brokers
  - name: KAFKA_SAVE_CAMPAIGN_DETAILS_TOPIC
    value: save-campaign-details
  - name: KAFKA_UPDATE_CAMPAIGN_DETAILS_TOPIC
    value: update-campaign-details
  - name: BASE_SECRET
    valueFrom:
      secretKeyRef:
        name: project-factory
        key: basesecret
  - name: EGOV_MDMS_HOST
