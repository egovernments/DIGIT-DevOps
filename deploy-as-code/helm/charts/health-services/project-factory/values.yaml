apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: project-factory-hpa
  namespace: "health"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-factory
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
