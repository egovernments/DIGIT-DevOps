environments:
  prod:
    values:
      - namespace: monitoring
      - ../../environments/central-instance-secrets.yaml
      - ../../environments/central-instance.yaml
---

repositories:
- name: grafana
  url: https://grafana.github.io/helm-charts
- name: prometheus-community
  url: https://prometheus-community.github.io/helm-charts
- name: jaegertracing
  url: https://jaegertracing.github.io/helm-charts
- name: kafka-ui
  url: https://provectus.github.io/kafka-ui-charts

templates:
  default: &default
    labels:
      target: ./{{`{{ .Release.Name }}`}}
    missingFileHandler: Warn

releases:
- name: loki-stack
  installed: true
  namespace: {{ .Values.namespace | default "default-namespace" }}
  chart: grafana/loki-stack
  version: 2.10.1
  <<: *default
  values:
  - ./values/loki-stack.yaml
  - loki:
      persistence: {{ .Values.loki.persistence | toYaml | nindent 8 }}
      {{- if .Values.loki.resources }}
      resources: {{ .Values.loki.resources | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.loki.additionalConfigs }}
      config:
        schema_config: {{ .Values.loki.additionalConfigs.schema_config | toYaml | nindent 10 }}
        storage_config: {{ .Values.loki.additionalConfigs.storage_config | toYaml | nindent 10 }}
        compactor: {{ .Values.loki.additionalConfigs.compactor | toYaml | nindent 10 }}
        table_manager: {{ .Values.loki.additionalConfigs.table_manager | toYaml | nindent 10 }}
        {{- if .Values.loki.additionalConfigs.ingester }}
        ingester: {{ .Values.loki.additionalConfigs.ingester | toYaml | nindent 10 }}
        {{- end }}
        {{- if .Values.loki.additionalConfigs.chunk_store_config }}
        chunk_store_config: {{ .Values.loki.additionalConfigs.chunk_store_config | toYaml | nindent 10 }}
        {{- end }}
        {{- if .Values.loki.additionalConfigs.query_range }}
        query_range: {{ .Values.loki.additionalConfigs.query_range | toYaml | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if .Values.loki.serviceAccount.annotations }}
      serviceAccount:
        annotations: {{ .Values.loki.serviceAccount.annotations | toYaml | nindent 10 }}
      {{- end }}

- name: kube-prometheus-stack
  installed: true
  namespace: {{ .Values.namespace | default "default-namespace" }}
  chart: prometheus-community/kube-prometheus-stack
  version: 56.6.2
  disableValidation: true
  <<: *default
  values:
  - ./values/prometheus.yaml
  - alertmanager:
      enabled: {{ .Values.prometheus.alertmanager.enabled }}
  {{- if .Values.prometheus.alertmanager.enabled }}
  - alertmanager:
      config: {{ index .Values "cluster-configs" "secrets" "alertmanager" "config" | toYaml | nindent 8 }}
  {{- end }}
  - prometheus:
      prometheusSpec:
        additionalScrapeConfigs: {{ .Values.prometheus.additionalScrapeConfigs | toYaml | nindent 8 }}
        externalLabels: {{ .Values.prometheus.externalLabels | toYaml | nindent 10 }}
        storageSpec: {{ .Values.prometheus.storageSpec | toYaml | nindent 10 }}
        retention: {{ .Values.prometheus.retention | toYaml | nindent 10 }}

- name: grafana
  installed: true
  namespace: {{ .Values.namespace | default "default-namespace" }}
  chart: grafana/grafana
  version: 7.3.0
  <<: *default
  values:
  - ./values/grafana.yaml
  - grafana.ini:
      auth.github:
        allowed_organizations: {{ .Values.grafana.github.allowed_organizations }}
        role_attribute_path: {{ .Values.grafana.github.role_attribute_path }}
  - envRenderSecret:
      GF_AUTH_GITHUB_CLIENT_ID: {{ index .Values "cluster-configs" "secrets" "grafana" "clientID" }}
      GF_AUTH_GITHUB_CLIENT_SECRET: {{ index .Values "cluster-configs" "secrets" "grafana" "clientSecret" }}
  set:
    - name: ingress.hosts[0]
      value: {{ .Values.global.domain | quote }}
    - name: ingress.tls[0].hosts[0]
      value: {{ .Values.global.domain | quote }}

- name: blackbox
  installed: true
  namespace: {{ .Values.namespace | default "default-namespace" }}
  chart: prometheus-community/prometheus-blackbox-exporter
  version: 8.2.0
  <<: *default
  values:
  - ./values/blackbox-exporter.yaml
  - {{ .Values | toYaml | nindent 8 }}

- name: kafka-ui
  installed: true
  namespace: backbone
  chart: kafka-ui/kafka-ui
  version: 0.7.6
  <<: *default
  values:
  - ./values/kafka-ui.yaml
  - {{ .Values | toYaml | nindent 8 }}
  set:
    - name: ingress.host
      value: {{ .Values.global.domain | quote }}
    - name: ingress.tls.secretName
      value: {{ printf "%s-tls-certs" .Values.global.domain | quote }}

- name: jaeger
  installed: false
  namespace: es-cluster
  chart: jaegertracing/jaeger
  version: 0.35.0
  <<: *default
  values:
  - ./values/jaeger.yaml
  - {{ .Values | toYaml | nindent 8 }}
  - storage:
      elasticsearch:
        password: {{ index .Values "cluster-configs" "secrets" "elasticsearch-master-creds" "password" }}
  set:
    - name: query.ingress.hosts[0]
      value: "{{ .Values.global.domain }}"
