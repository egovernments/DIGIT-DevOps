# Common Labels
labels:
  app: "digit-a11y"
  group: "studio"

namespace: studio

# Ingress Configs
ingress:
  enabled: true
  context: "digit-a11y"
  additionalAnnotations: |
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

# Init Containers Configs
initContainers: {}

replicas: 1

# Container Configs
image:
  repository: "digit-a11y"

httpPort: 3000

resources: |
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "6Gi"

healthChecks:
  enabled: true
  livenessProbePath: "/digit-a11y/api/health"
  readinessProbePath: "/digit-a11y/api/health"

# Additional Container Envs
env: |
  - name: NODE_ENV
    value: "production"
  - name: API_HOST
    value: "0.0.0.0"
  - name: API_PORT
    value: "3000"
  - name: BASE_PATH
    value: "/digit-a11y"
  - name: SITE_CONCURRENCY
    value: "4"
  - name: SITE_SCAN_TIMEOUT_MS
    value: "1800000"
  - name: SCAN_TIMEOUT_MS
    value: "120000"
  - name: JOB_MAX_AGE_MS
    value: "1800000"
  - name: LOG_LEVEL
    value: "warn"
  - name: ARTIFACTS_DIR
    value: "/tmp/digit-a11y-artifacts"
