global:
  domain: builds.digit.org
cluster-configs:
  namespaces:
    create: true
    values: [ jenkins ]
  root-ingress:
    namespace: jenkins
    serviceName: jenkins
    servicePort: 8080
    appRoot: ""
    cert-issuer: "letsencrypt-prod"

  git-sync:
    namespace: monitoring  

jenkins:
  vcs:
    provider: github
    webUrl: ""    # leave empty for github.com; GHE e.g. https://github.mycompany.com
    apiUrl: ""    # leave empty for api.github.com; GHE: https://github.mycompany.com/api/v3
  CIOps:
    repo: git@github.com:egovernments/CIOps.git
    branch: jenkins-upgrade
  persistence:
    enabled: true
    size: "350Gi"
    storageClass: "gp3"
    aws:
      volumeId: "vol-0bb1df0e78bb51334"
      zone: "ap-south-1b"
  oauth:
    enabled: true
    acl:
      admin:
        - egovernments*micro-service-devops
      user:
        - egovernments*unified-dev
        - egovernments*unified-qa
        - egovernments*unified-uat
        - egovernments*jenkins-user
        - egovernments*digit-lts
        - egovernments*sandbox-prod
        - egovernments*moz-health-prd
        - egovernments*hcm-demo
        - egovernments*central-instance
        - egovernments*central-instance-staging
        - egovernments*ng-upgrade-uat
        - egovernments*unified-studio-uat
        - egovernments*unified-studio-dev
        - egovernments*sierraleone-central-uat

  jobBuilder:
    repos:
      - HCM-MOZ-IMPEL/DIGIT-Dev-Moz-Impl
      - egovernments/core-services
      - egovernments/business-services
      - egovernments/municipal-services
      - egovernments/utilities
      - egovernments/frontend
      - egovernments/requester-dashboard
      - egovernments/approver-dashboard
      - egovernments/punjab-rainmaker-customization
      - egovernments/egov-coexistence
      - egovernments/test-automation
      - egovernments/CoronaSafe
      - egovernments/eGov-dcr-service
      - egovernments/digit-ui
      - egovernments/DIGIT-Works
      - egovernments/health-campaign-services
      - egovernments/punjab-mgramseva
      - egovernments/SANITATION
      - egovernments/Digit-Core
      - egovernments/iFix-Dev
      - egovernments/bihar-mgramseva
      - egovernments/DIGIT-Frontend
      - egovernments/DIGIT-UI-LIBRARIES
      - egovernments/Program-Management-Services
      - egovernments/unified-benefits-administration
      - egovernments/DIGIT-Common
      - egovernments/DIGIT-Analytics
      - egovernments/URBAN
      - egovernments/naljal-digit
      - egovernments/Citizen-Complaint-Resolution-System

  deploymentJobs:
    # ---------------------------------------------------------------------------
    # CI (1)
    # ---------------------------------------------------------------------------
    - name: ci #devops
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: egov-jenkins
      acl: [egovernments*micro-service-devops]

    # ---------------------------------------------------------------------------
    # Unified — Dev  (7)
    # ---------------------------------------------------------------------------
    - name: unified-dev #devops
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*internal-devops-team,egovernments*unified-dev]
    - name: unified-health-dev #shruti
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-health-dev]
    - name: unified-studio-dev #tulika
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-studio-dev]
    - name: unified-urban-dev #vinoth
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-urban-dev]
    - name: unified-works-dev #sudha
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-works-dev]
    - name: unified-care-dev #sudha
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-care-dev]

    # ---------------------------------------------------------------------------
    # Unified — QA  (9)
    # ---------------------------------------------------------------------------
    - name: unified-qa #devops
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-qa]
    - name: unified-health-qa #shruti
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-health-qa]
    - name: unified-urban-qa #vinoth
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-urban-qa]
    - name: unified-works-qa #sudha
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-works-qa]
    - name: unified-care-qa #sudha
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-care-qa]

    # ---------------------------------------------------------------------------
    # Unified — UAT  (5)
    # ---------------------------------------------------------------------------
    - name: unified-uat
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-uat]
    - name: unified-health-uat
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-health-uat]
    - name: unified-studio-uat
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-studio-uat]
    - name: unified-urban-uat
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-urban-uat]
    - name: unified-works-uat
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: unified-env-lts
      acl: [egovernments*unified-works-uat]

    # ---------------------------------------------------------------------------
    # Central Instance  (4) #Pradeep/#Vinoth
    # ---------------------------------------------------------------------------
    - name: central-instance
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: central-instance-deployment
      acl: [egovernments*central-instance]
    - name: central-instance-staging
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: central-instance-deployment
      acl: [egovernments*central-instance-staging]

    # ---------------------------------------------------------------------------
    # Sandbox  (2) #Pradeep
    # ---------------------------------------------------------------------------
    - name: sandbox-demo
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: sandbox-demo
      acl: [egovernments*sandbox-demo]
    - name: sandbox-prod
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: sandbox-prod
      acl: [egovernments*sandbox-prod]

    # ---------------------------------------------------------------------------
    # HCM — Demo  (1) #Shruti
    # ---------------------------------------------------------------------------
    - name: hcm-demo-new
      repo: git@github.com:egovernments/health-campaign-devops.git
      branch: hcm-demo-new
      helmDir: config-as-code/helm
      acl: [egovernments*hcm-demo]

    # ---------------------------------------------------------------------------
    # Mozambique Health / HCM-MOZ-IMPEL  (3) #Divij
    # ---------------------------------------------------------------------------
    - name: moz-health-prd #divij
      repo: git@github.com:HCM-MOZ-IMPEL/health-campaign-devops.git
      branch: main
      helmDir: config-as-code/helm
      acl: [egovernments*moz-health-prd]
    - name: moz-health-qa #divij
      repo: git@github.com:HCM-MOZ-IMPEL/health-campaign-devops.git
      branch: main
      helmDir: config-as-code/helm
      acl: [egovernments*moz-health-cicd]
    - name: moz-health-uat #divij
      repo: git@github.com:HCM-MOZ-IMPEL/health-campaign-devops.git
      branch: main
      helmDir: config-as-code/helm
      acl: [egovernments*moz-health-cicd]

    # ---------------------------------------------------------------------------
    # NG Upgrade / Sierra Leone / HCM-KEBBI  (2) #Divij
    # ---------------------------------------------------------------------------
    - name: ng-upgrade-uat
      repo: git@github.com:HCM-KEBBI/kebbi-devops.git
      branch: central-uat-build
      helmDir: config-as-code/helm
      acl: [egovernments*ng-upgrade-uat]
    - name: sierraleone-central-uat
      repo: git@github.com:HCM-KEBBI/kebbi-devops.git
      branch: central-uat-build
      helmDir: config-as-code/helm
      acl: [egovernments*sierraleone-central-uat]

    # ---------------------------------------------------------------------------
    # DIGIT LTS  (2) #Aniket
    # ---------------------------------------------------------------------------
    - name: digit-lts
      repo: git@github.com:egovernments/DIGIT-DevOps.git
      branch: digit-lts
      acl: [egovernments*digit-lts]

  master:
    ingress:
      enabled: true
      hostName: jenkins-upgrade.digit.org
      tls:
        - secretName: jenkins-upgrade.digit.org-tls-certs
          hosts:
            - jenkins-upgrade.digit.org
    resources:
      limits:
        cpu: "2500m"
        memory: "5120Mi"
    javaOpts: >-
      -Xms3100M -Xmx3100M
      -Djava.awt.headless=true
      -Dfile.encoding=UTF-8
      -Duser.timezone=Asia/Calcutta
      -XX:+UseG1GC
      -XX:+ExplicitGCInvokesConcurrent
      -XX:+ParallelRefProcEnabled
      -XX:+DisableExplicitGC
      -XX:+AlwaysPreTouch
    nodeSelector:
      dedicated: egov-jenkins
    tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: egov-jenkins

binfmt:
  namespace: kube-system

ingress-nginx:
  default-backend-service: "jenkins/jenkins"
  namespaceOverride: jenkins
  cert-issuer: "letsencrypt-prod"
  ssl-protocols: "TLSv1.2 TLSv1.3"
  ssl-ciphers: "EECDH+CHACHA20:EECDH+AES"
  ssl-ecdh-curve: "X25519:prime256v1:secp521r1:secp384r1"
  controller:
    replicas: 1
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
      prometheusRule:
        enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 100m
        memory: 200Mi
    addHeaders:
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"
      X-XSS-Protection: "1; mode=block"
      Access-Control-Allow-Origin: "https://jenkins-upgrade.digit.org"
      Access-Control-Allow-Methods: "GET, POST, OPTIONS"
      Access-Control-Allow-Headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range"
    setSslTls: "jenkins-upgrade.digit.org-tls-certs"

cert-manager:
  namespace: jenkins
  email: "devops-team@egov.org.in"


       
