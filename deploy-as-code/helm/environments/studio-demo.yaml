  initContainers:
    gitSync:
      repo: "git@github.com:egovernments/configs"      ##### Change repo url with Your fork Repo url
      branch: "studio-demo"                                    ##### Change repo branch with Your fork Repo branch

egov-user:
  central-instance-name: egov
  central-instance-build: true
  central-instance-enabled: false
  db-schema-names: "kano,kebbi"
  replicas : 2
  heap: "-Xmx512m -Xms256m"
  otp-validation: "true"
  citizen-otp-enabled: "true"
  employee-otp-enabled: "false"
  access-token-validity: 10080
  refresh-token-validity: 20160
  default-password-expiry: 90
  mobile-number-validation: "false"
  roles-state-level: "true"
  citizen-registration-withlogin: "true"
  citizen-otp-fixed: "123456"
  citizen-otp-fixed-enabled: "true"
  decryption-abac-enabled: "false"
  spring-datasource-tomcat-max-active: "10"
  logging-level-web: DEBUG
  logging-level-org-egov-user: DEBUG
  logging-level-org-springframework-web: DEBUG
  logging-level-org-springframework-security: DEBUG
  auth-oidc-enabled: "true"
  auth-oidc-providers-source: mdms
  mdms-oidcproviders-tenantid: mz
  java-tool-options: "-Djava.net.preferIPv4Stack=true -Djdk.httpclient.allowRestrictedHeaders=host -Dhttps.protocols=TLSv1.2"
  egov-hrms-enabled: true
  egov-hrms-employee-create-url: /egov-hrms/employees/_create
  egov-boundary-enabled: true
  egov-boundary-hierarchy-search-url: /boundary-service/boundary-hierarchy-definition/_search
  egov-boundary-relationships-search-url: /boundary-service/boundary-relationships/_search
  oidc-google-secret-enabled: true
  oidc-google-secret-key: graph-client-secret-mz-oidc-google

egov-workflow-v2:
  central-instance-name: egov
  central-instance-build: true
  central-instance-enabled: false
  db-schema-names: "kano,kebbi"
  logging-level: "DEBUG"
  java-args: -Dspring.profiles.active=monitoring
  workflow-statelevel: "true"
  host-link: "https://egov-demo.egovernments.org/citizen/"
  pdf-link: "/download/epass?tenantId={TENANTID}&ids={UUID}"

gateway:
  replicas: 1
  custom-filter-property: "false"
  tracing-enabled: "true"
  heap: "-Xmx512m -Xms512m"
  java-debug: "true"
  server-tomcat-max-threads: "350"
  server-tomcat-max-connections: "1500"
