global:
   domain: studio-demo.digit.org
   setup: fullsetup

cluster-configs:
    namespaces:  
      create: true
      values: [ backbone, cert-manager, egov, health, monitoring, playground, studio ]
      
    root-ingress:
      cert-issuer: letsencrypt-prod
      namespace: studio
      appRoot: digit-studio
      serviceName: digit-studio
      servicePort: 80

    configmaps:
        egov-config:
            namespace: [ egov, health, studio ]
            data:
              db-host: studio-demo-server.postgres.database.azure.com
              db-name: studio-demo-db
              db-url: jdbc:postgresql://studio-demo-server.postgres.database.azure.com:5432/studio-demo-db
              db-url-no-schema: jdbc:postgresql://studio-demo-server.postgres.database.azure.com:5432/studio-demo-db
              domain: studio-demo.digit.org
              egov-services-fqdn-name: https://studio-demo.digit.org/
              egov-state-level-tenant-id: "st" 
              s3-assets-bucket: "(pg-egov-assets|egov-playground-assets)"
              es-host: "elasticsearch-data.backbone"
              es-indexer-host: "http://elasticsearch-data.backbone:9200/"
              flyway-locations: "filesystem:/flyway/sql,filesystem:/flyway/seed,filesystem:/flyway/qa"
              kafka-brokers: "kafka-kraft-controller-headless.backbone:9092"
              kafka-infra-brokers: kafka-v2-infra.kafka-cluster:9092
              logging-level-jdbc: "DEBUG"
              mobile-validation-workaround: "true"
              serializers-timezone-in-ist: "true"
              server-tomcat-max-connections: "500"
              server-tomcat-max-threads: "10"
              sms-enabled: "true"
              spring-datasource-tomcat-initialSize: "1"
              spring-datasource-tomcat-max-active: "2"
              spring-jpa-show-sql: "true"
              timezone: Asia/Kolkata
              tracer-errors-provideexceptionindetails: "true"
              egov-bnd-freedownload-tenants: "pg.testing"
              egov-bnd-live-citizen-tenants: "pg.testing"
              redis-host-worker: "redis.backbone"
              kafka-tenant-id-pattern: ''

        egov-service-host:
            namespace: [ egov, health, studio ]
            data:
              billing-service: "http://billing-service.egov:8080/"
              boundary-service: "http://boundary-service.egov:8080/"
              bpa-services: "http://bpa-services.egov:8080/"
              egov-accesscontrol: "http://egov-accesscontrol.egov:8080/"
              egov-apportion-service: "http://egov-apportion-service:8080/"
              egov-edcr: "http://egov-edcr.egov:8080/"
              egov-enc-service: "http://egov-enc-service.egov:8080/"
              egov-filestore: "http://egov-filestore.egov:8080/"
              egov-hrms: "http://egov-hrms.egov:8080/"
              egov-idgen: "http://egov-idgen.egov:8080/"
              egov-indexer: "http://egov-indexer.egov:8080/"
              egov-localization: "http://egov-localization.egov:8080/"
              egov-mdms-service: "http://mdms-v2.egov:8080/"
              egov-otp: "http://egov-otp.egov:8080/"
              egov-url-shortening: "http://eus:8080/"
              egov-user: "http://egov-user.egov:8080/"
              egov-user-egov: "http://egov-user.egov:8080/"
              egov-workflow-v2: "http://egov-workflow-v2.egov:8080/"
              health-individual: "http://health-individual.health:8080/"
              health-service-request: "http://health-service-request.health:8080/"
              pdf-service: "http://pdf-service.egov:8080/"
              property-services: "http://property-services.egov:8080/"
              public-service: "http://public-service.studio:8080/"
              public-service-init: "http://public-service-init.studio:8080/"
              studio-calculator-service: "http://studio-calculator-service.studio:8080/"
              user-otp: "http://user-otp.egov:8080/"
    
    secrets:
      db: 
        namespace: [ egov, health, studio ]
        name: db
      git-sync:
        namespace: [ egov, health, studio ]
        name: git-creds
      elasticsearch-master-creds:
        namespace: [ backbone, egov, health, studio ]
        name: elasticsearch-master-credentials
      egov-notification-sms:
        namespace: [ egov ]
      sso:
        namespace: egov
        name: sso

boundary-service:
  replicas: 2
  heap: '-Xmx512m -Xms512m'
  memory_limits: 512Mi

digit-studio:
  namespace: studio
  custom-js-injection: |
    sub_filter.conf: "
      sub_filter  '<head>' '<head>
      <script src=https://egov-dev-assets.s3.ap-south-1.amazonaws.com/analytics/analytics.js type=text/javascript async></script>
      <script src=https://egov-uat-assets.s3.ap-south-1.amazonaws.com/globalConfigsStudio.js type=text/javascript></script>';"

egov-accesscontrol:
  replicas : 1
  heap: "-Xmx256m -Xms256m"

egov-enc-service:
  replicas: 1
  heap: '-Xmx512m -Xms256m'
  memory_limits: 512Mi
  cpu_limits: 300m

egov-filestore:
  volume: /opt/eGov/filestore
  is-bucket-fixed: "true"
  replicas : 2
  minio.url : "http://minio.backbone:9000/"
  aws.s3.url : "https://s3.amazonaws.com"
  is-s3-enabled: "false"   ## Azure Blob backend (see egov-filestore chart ISAZURESTORAGEENABLED)
  minio-enabled: false
  allowed-file-formats-map: "{jpg:{'image/jpg','image/jpeg'},jpeg:{'image/jpeg','image/jpg'},png:{'image/png'},pdf:{'application/pdf'},odt:{'application/vnd.oasis.opendocument.text'},ods:{'application/vnd.oasis.opendocument.spreadsheet'},docx:{'application/x-tika-msoffice','application/x-tika-ooxml','application/vnd.oasis.opendocument.text','application/msword'},doc:{'application/x-tika-msoffice','application/x-tika-ooxml','application/vnd.oasis.opendocument.text','application/msword'},dxf:{'text/plain','application/dxf','application/octet-stream','image/vnd.dxf','image/vnd.dxf; format=ascii','image/vnd.dxf; format=binary','image/vnd.dxb'},csv:{'text/plain'},txt:{'text/plain'},xlsx:{'application/x-tika-ooxml','application/x-tika-msoffice','application/vnd.ms-excel','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','application/zip'},xls:{'application/x-tika-ooxml','application/x-tika-msoffice','application/vnd.ms-excel','multipart/form-data'},zip:{'application/zip','application/octet-stream'},geojson:{'application/json','text/plain','application/geo+json','multipart/form-data'}}"
  allowed-file-formats: "jpg,jpeg,png,doc,docx,pdf,odt,ods,text,dxf,xls,xlsx"
  filestore-url-validity: 3600
  fixed-bucketname: studio-demo-filestore  ## Add filestore bucket name
  kafka-malware-scan-enabled: false
  kafka-topics-malware-scan-request: "egov.malware.file-scan-request"

egov-hrms:
  java-args: -Dspring.profiles.active=monitoring
  employee-applink: "https://studio-demo.digit.org/digit-studio/employee"
  heap: '-Xmx256m -Xms256m'

egov-idgen:
  replicas : 1
  idformat-from-mdms: "true"
  java-args: -Dspring.profiles.active=monitoring
  autocreate-new-seq: "true"
  heap: "-Xmx512m -Xms256m"
  memory_limits: 512Mi

egov-indexer:
  heap: "-Xmx512m -Xms512m"
  initContainers:
    gitSync:
      repo: "git@github.com:egovernments/configs"        ##### Change repo url with Your fork Repo url
      branch: "studio-demo"                                      ##### Change repo branch with Your fork Repo branch
  egov-indexer-yaml-repo-path: "file:///work-dir/configs/health/egov-indexer/error-queue.yml,file:///work-dir/configs/health/egov-indexer/product-indexer.yml,file:///work-dir/configs/health/egov-indexer/project-indexer.yml,file:///work-dir/configs/health/egov-indexer/individual-indexer.yml,file:///work-dir/configs/health/egov-indexer/household-indexer.yml,file:///work-dir/configs/health/egov-indexer/project-task-indexer.yml,file:///work-dir/configs/health/egov-indexer/stock-indexer.yml,file:///work-dir/configs/health/egov-indexer/facility-indexer.yml,file:///work-dir/configs/health/egov-indexer/project-staff-indexer.yml,file:///work-dir/configs/health/egov-indexer/egov-error-queue-indexer.yml,file:///work-dir/configs/health/egov-indexer/pgr-services.yml,file:///work-dir/configs/health/egov-indexer/service-request-indexer.yml,file:///work-dir/configs/sanitation/egov-indexer/pqm-service-indexer.yml,file:///work-dir/configs/sanitation/egov-indexer/egov-pqm-service.yml,file:///work-dir/configs/sanitation/egov-indexer/pqm-anomaly-finder-indexer.yml,file:///work-dir/configs/sanitation/egov-indexer/egov-fsm.yaml,file:///work-dir/configs/sanitation/egov-indexer/egov-vehicle.yaml,file:///work-dir/configs/sanitation/egov-indexer/egov-vendor.yaml,file:///work-dir/configs/sanitation/egov-indexer/fsm-inbox-indexer.yml,file:///work-dir/configs/health/egov-indexer/referral-management-indexer.yml,file:///work-dir/configs/health/egov-indexer/transformer-pgr-services.yml,file:///work-dir/configs/health/egov-indexer/attendance-service-indexer.yml,file:///work-dir/configs/health/egov-indexer/household-member-indexer.yml,file:///work-dir/configs/health/egov-indexer/census-service-indexer.yml,file:///work-dir/configs/health/egov-indexer/plan-service-indexer.yml,file:///work-dir/configs/egov-indexer/public-service-indexer.yml,file:///work-dir/configs/health/egov-indexer/expense-bill-service-indexer.yml,file:///work-dir/configs/health/egov-indexer/muster-service-indexer.yml,file:///work-dir/configs/health/egov-indexer/test-python-kafka.yml,file:///work-dir/configs/health/egov-indexer/transformed-error-tracer.yml,file:///work-dir/configs/health/egov-indexer/user-action-indexer.yml"

egov-localization:
  replicas: 3
  heap: '-Xmx6144m -Xms2048m'
  memory_limits: 7168Mi
  cpu_limits: 1200m
  memory_requests: 5120Mi
  cpu_requests: 500m

egov-notification-sms:
  sms-provider-url: "http://api.smscountry.com/SMSCwebservice_bulk.aspx"
  sms.provider.class: "Generic"
  sms.provider.contentType:  "application/x-www-form-urlencoded"
  sms-config-map: "{'User':'$username', 'passwd': '$password', 'sid':'$senderid', 'mobilenumber':'$mobileno', 'message':'$message', 'mtype':'LNG', 'DR':'N', 'smsservicetype':'singlemsg'}"
  sms.senderid: "EGOVFS"
  sms-gateway-to-use: "SMS_COUNTRY"
  sms-sender: "SMSCOUNTRY"
  sms-sender-requesttype: "GET"
  sms-custom-config: "true"
  sms-extra-req-params: "mtype=N&DR=Y"
  sms-sender-req-param-name: "sid"
  sms-sender-username-req-param-name: "User"
  sms-sender-password-req-param-name: "passwd"
  sms-destination-mobile-req-param-name: "mobilenumber"
  sms-message-req-param-name: "message"
  sms-error-codes: "401,403,404,405,406,407,408,409,410,411,412,413,414"

egov-otp:
  central-instance-name: egov
  central-instance-build: true
  central-instance-enabled: false
  db-schema-names: "kano,kebbi"
  memory_limits: "512Mi"
  heap: "-Xmx256m -Xms256m"

egov-persister:
  replicas: 3
  images:
    - egovio/egov-persister
  persist-yml-path: "file:///work-dir/configs/egov-persister/pgr-services-persister.yml,file:///work-dir/configs/health/egov-persister/hrms-employee-persister.yml,file:///work-dir/configs/health/egov-persister/product-persister.yml,file:///work-dir/configs/health/egov-persister/project-persister.yml,file:///work-dir/configs/egov-persister/individual-persister.yml,file:///work-dir/configs/health/egov-persister/individual-persister.yml,file:///work-dir/configs/health/egov-persister/household-persister.yml,file:///work-dir/configs/health/egov-persister/project-task-persister.yml,file:///work-dir/configs/health/egov-persister/stock-persister.yml,file:///work-dir/configs/health/egov-persister/facility-persister.yml,file:///work-dir/configs/health/egov-persister/pgr-services-persister.yml,file:///work-dir/configs/health/egov-persister/egov-workflow-v2-persister.yml,file:///work-dir/configs/health/egov-persister/mdms-persister.yml,file:///work-dir/configs/egov-persister/referral-management-persister.yml,file:///work-dir/configs/health/egov-persister/hcm-moz-impl-persister.yml,file:///work-dir/configs/health/egov-persister/eg-campaign-details-persister.yml,file:///work-dir/configs/sanitation/egov-persister/pqm-anomaly-finder-persister.yaml,file:///work-dir/configs/sanitation/egov-persister/pqm-persister.yaml,file:///work-dir/configs/sanitation/egov-persister/fsm-calculator-persister.yaml,file:///work-dir/configs/sanitation/egov-persister/fsm-persister.yaml,file:///work-dir/configs/sanitation/egov-persister/vehicle-persister.yaml,file:///work-dir/configs/sanitation/egov-persister/vendor-persister.yaml,file:///work-dir/configs/egov-persister/egov-user-event-persister.yml,file:///work-dir/configs/health/egov-persister/service-request-persister.yml,file:///work-dir/configs/health/egov-persister/referral-management-persister.yml,file:///work-dir/configs/health/egov-persister/attendance-service-persister.yml,file:///work-dir/configs/egov-persister/boundary-persister.yml,file:///w