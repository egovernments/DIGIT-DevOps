### jupyter-hub >>>>>>>>>>>>>>>>>>>>
jupyterhub:
  hub:
    config:
      Authenticator:
        admin_users:
          - studio-demo-admin
      NativeAuthenticator:
        minimum_password_length: 8
        check_common_password: false
        allowed_failed_logins: 5
        seconds_before_next_try: 300
      JupyterHub:
        admin_access: true
  ingress:
    enabled: true
    hosts:
      - studio-demo.digit.org
    tls:
      - hosts:
          - studio-demo.digit.org
        secretName: studio-demo.digit.org-tls-certs
# <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

kafka-ui:
  yamlApplicationConfig:
    kafka:
      clusters:
        - name: studio-demo
          bootstrapServers: kafka-kraft-controller-headless.backbone:9092
          readonly: true

pgadmin:
  dbUrl: "studio-demo-server.postgres.database.azure.com"
  environment: "studio_DEMO"
  maintenance-db-name: "studio-demo-db"
  db-admin-username: "studiodemo"
  db-read-username: "studiodemo_read"
  max-query-history: "50"
  max-login-attempts: "10"
  enable-save-password: "False"
  persistence:
    enabled: true
    dataDirSize: "10Gi"

### Grafana >>>>>>>>>>>>>>>>>>>>
grafana:
  github:
    allowed_organizations: ["egovernments"]
    role_attribute_path: contains(groups[*], '@egovernments/studio-demo') && 'Viewer'
# <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

### Prometheus & Alertmanager >>>>>>>>>>>>>>>>>>>>
prometheus:
  alertmanager:
    enabled: true
  externalLabels:
    cluster: studio-demo
  retention: 90d
  storageSpec:
    volumeClaimTemplate:
      spec:
        storageClassName: default
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 30Gi
  additionalScrapeConfigs:
    - job_name: 'ingress-nginx-metrics'
      static_configs:
        - targets: [ 'ingress-nginx-controller-metrics.backbone:10254' ]
    - job_name: 'blackbox'
      metrics_path: /probe
      params:
        module: [ http_2xx ]
      static_configs:
        - targets:
            - https://studio-demo.digit.org/
            - https://studio-demo.digit.org/jupyter/hub/
            - https://studio-demo.digit.org/kibana/
            - https://studio-demo.digit.org/pgadmin/
      relabel_configs:
        - source_labels: [ __address__ ]
          target_label: __param_target
        - source_labels: [ __param_target ]
          target_label: instance
        - target_label: __address__
          replacement: prometheus-blackbox-exporter:9115
    - job_name: 'blackbox_exporter'
      static_configs:
        - targets: [ 'prometheus-blackbox-exporter:9115' ]
# <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

### loki-stack >>>>>>>>>>>>>>>>>>>>
loki:
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 30Gi
    storageClassName: default
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::349271159511:role/sandbox-prod-loki-stack-role
  additionalConfigs:
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: s3
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/index
        cache_location: /data/loki/index_cache
        shared_store: s3
        cache_ttl: 72h
      aws:
        s3: s3://ap-south-1/digit-sandbox-prod-s3
      filesystem:
        directory: /data/loki/chunks
    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
      retention_enabled: true
      compaction_interval: 168h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h  # 30 days
# <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
