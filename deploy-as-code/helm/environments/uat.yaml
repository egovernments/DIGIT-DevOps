# kafka-v2 AWS >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
kafka-v2:
  image:
    tag: "5.4.1"
  persistence:
    enabled: true
    iscsi:
      targetPortal: 192.168.1.160:3260
      iqn:
      - iqn.2005-10.org.freenas.ctl:kafka-v2-0
      - iqn.2005-10.org.freenas.ctl:kafka-v2-1
      - iqn.2005-10.org.freenas.ctl:kafka-v2-2
    zookeeperHosts: "zookeeper-v2.zookeeper-cluster:2181/kafka"
  
  heap: "-Xmx750m -Xms750m"
  heapOptions: "-Xms704M -Xmx704M -XX:TieredStopAtLevel=1"
  memory_limits: 2048Mi
  lingerMs: "250"
  numberPartitions: "3"
  replicationFactor: "2"
  minInsyncReplicas: "1"
  offsetsReplicationFactor: "3"
      
### Kafka Connect <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
kafka-connect:
  image:
    tag: "5.4.1"  


# zookeeper-v2 AWS >>>>>>>>>>>>>>>>>>>>>>>>>>>>>
zookeeper-v2:
  persistence:
    enabled: true
    iscsi:
     targetPortal: 192.168.1.160:3260
     iqn:
     - iqn.2005-10.org.freenas.ctl:zookeeper-v2-0
     - iqn.2005-10.org.freenas.ctl:zookeeper-v2-1
     - iqn.2005-10.org.freenas.ctl:zookeeper-v2-2

  ## Zookeeper JVM Heap Option
  heapOptions: "-Xms256M -Xmx256M"
  resources:
    limits:
      cpu: 300m
      memory: 384Mi
    requests:
      cpu: 300m
      memory: 384Mi


# es-v1-cluster AWS >>>>>>>>>>>>>>>>>>>>>>>>>>>>
elasticsearch-data-v1:
  persistence:
    enabled: true
    iscsi:
     targetPortal:  192.168.1.160:3260
     iqn:
     - iqn.2005-10.org.freenas.ctl:elasticsearch-data-v1
     - iqn.2005-10.org.freenas.ctl:elasticsearch-data-v1-1
     - iqn.2005-10.org.freenas.ctl:elasticsearch-data-v1-2

  esJavaOpts: "-Xmx1g -Xms1g"
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

### es-master-v1 AWS >>>>>>>>>>>>>>>>>>>>

elasticsearch-master-v1:
  replicas: 1
  persistence:
    enabled: true
    iscsi:
     targetPortal:  192.168.1.160:3260
     iqn:
     - iqn.2005-10.org.freenas.ctl:elasticsearch-master-v1-0
     - iqn.2005-10.org.freenas.ctl:elasticsearch-master-v1-0
     - iqn.2005-10.org.freenas.ctl:elasticsearch-master-v1-0
 
  esJavaOpts: "-Xmx448m -Xms448m"
  resources:
    requests:
      cpu: "300m"
      memory: "896Mi"
    limits:
      cpu: "500m"
      memory: "896Mi"

es-curator:
  schedule: "45 18 * * *"
  images:
    - bobrik/curator:5.6.0
  es-host: "elasticsearch-client-v1.es-cluster"
  logs-cleanup-enabled: "true"
  jaeger-cleanup-enabled: "true"
  logs-to-retain: "7"
