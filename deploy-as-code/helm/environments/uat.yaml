collection-services:
  receiptnumber-servicebased: "true"
  receipt-search-paginate: "true"
  receipt-search-defaultsize: 30
  user-create-enabled: "true"

collection-receipt-voucher-consumer:
  dehradun-erp-host: "https://dehradun-uk.nagalandhealthproject.org/"
  doiwala-erp-host: "https://doiwala-uk.nagalandhealthproject.org/"

finance-collections-voucher-consumer:
  erp-env-name: "uk"
  erp-domain-name: "nagalandhealthproject.org"


user-otp:
  logging-level: "DEBUG"

# rainmaker-pgr >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
rainmaker-pgr:
  notification-sms-enabled: "true"
  notification-email-enabled: "false"
  new-complaint-enabled: "true"
  reassign-complaint-enabled: "true"
  reopen-complaint-enabled: "true"
  comment-by-employee-notif-enabled: "false"
  notification-allowed-status: "open,assigned,rejected,resolved"

pt-services-v2:
  pt-userevents-pay-link: "/citizen/otpLogin?mobileNo=$mobile&redirectTo=egov-common/pay?consumerCode=$consumerCode&tenantId=$tenantId"

pt-calculator-v2:
  logging-level: "DEBUG"

tl-services:
  heap: "-Xmx128m -Xms64m"
  memory_limits: 384Mi
  java-args: -Dspring.profiles.active=monitoring
  tl-application-num-format: "APP-[SEQ_EG_TL_APL]"
  tl-license-num-format: "MP-LEP-[SEQ_EG_PT_LN]"
  tl-userevents-pay-link: "citizen/otpLogin?mobileNo=$mobile&redirectTo=egov-common/pay?consumerCode=$applicationNo&tenantId=$tenantId"
  tl-payment-topic-name: "egov.collection.payment-create"
  host-link: "https://msewa.nagalandhealthproject.org/citizen/"
  pdf-link: "https://msewa.nagalandhealthproject.org/egov-pdf/download/epass?tenantId={TENANTID}&uuid={UUID}"
  tl-search-default-limit: "100"

egov-workflow-v2:
  logging-level: "DEBUG"
  java-args: -Dspring.profiles.active=monitoring
  workflow-statelevel: "true"
  host-link: "https://msewa.nagalandhealthproject.org/citizen/"
  pdf-link: "/download/epass?tenantId={TENANTID}&ids={UUID}"

egov-hrms:
  java-args: -Dspring.profiles.active=monitoring
  employee-applink: "https://uk.nagalandhealthproject.org/employee/user/login"

# eGov-finance Tenantsk9s
financeTenants: |
  tenant.dehradun-uk.nagalandhealthproject.org=dehradun
  tenant.doiwala-uk.nagalandhealthproject.org=doiwala
  location.user.role=Collection Operator
  collection.debitaccounthead.client.impl.class=org.egov.collection.integration.services.DebitAccountHeadDetailsServiceImpl

egov-finance:
  dev_mode: true
  filestore_beanname: microDiskFileStoreService  


