global:
   domain: unified-dev.digit.org ## Add your Domain Name "Eg: site.mydomain.com" Do not use the dummy domain
   setup: fullsetup

cluster-configs:
  namespaces:  
    create: false
    values: [ care ]
      
  root-ingress:
    cert-issuer: letsencrypt-prod
  configmaps:
    egov-config:
      namespace: [ care ]
      data:
        db-host: unified-dev-db-new.czvokiourya9.ap-south-1.rds.amazonaws.com ## Add db-host name eg: egov-demo.database.azure.com
        db-name: unifieddevdb ## Add db-name
        db-url: jdbc:postgresql://unified-dev-db-new.czvokiourya9.ap-south-1.rds.amazonaws.com:5432/unifieddevdb ## example: jdbc:postgresql://egov-demo.postgres.database.azure.com:5432/egov_demo
        db-url-no-schema: "jdbc:postgresql://unified-dev-db-new.czvokiourya9.ap-south-1.rds.amazonaws.com:5432/unifieddevdb" ## example: jdbc:postgresql://egov-demo.postgres.database.azure.com:5432/egov_demo
        domain: "https://unified-dev.digit.org" ## Add your Domain Name
        egov-services-fqdn-name: "https://unified-dev.digit.org/" ## Add your Domain Name
        logging-level-jdbc: "DEBUG"
        mobile-validation-workaround: "true"
        serializers-timezone-in-ist: "true"
        server-tomcat-max-connections: "500"
        server-tomcat-max-threads: "10"
        sms-enabled: "true"
        spring-datasource-tomcat-initialSize: "1"
        spring-datasource-tomcat-max-active: "2"
        spring-jpa-show-sql: "true"
        timezone: Asia/Kolkata
        tracer-errors-provideexceptionindetails: "true"

    egov-service-host:
      namespace: [ care ]
      data:
        # Care HMIS services
        care-backend: "http://care-backend.care:9000/"
        care-frontend: "http://care-frontend.care:80/"
        radiology-ohif: "http://radiology-ohif.care:80/"
        radiology-nginx: "http://radiology-nginx.care:80/"

    radiology-config:
      namespace: [ care ]
      data:
        AE_TITLE: DCM4CHEE
        ARCHIVE_DEVICE_NAME: dcm4chee-arc
        CARE_BACKEND_URL: "http://care-backend.care:9000"
        DICOM_PORT: "11112"
        DOMAIN: "unified-dev.digit.org"
        JAVA_OPTS: "-Xms4g -Xmx6g -XX:MetaspaceSize=512m -XX:MaxMetaspaceSize=1024m"
        LDAP_BASE_DN: dc=dcm4che,dc=org
        LDAP_DOMAIN: dcm4che.org
        LDAP_ORGANISATION: dcm4che.org
        LDAP_URL: ldap://radiology-ldap:389
        MINIO_BUCKET: dicom-bucket
        MINIO_ENDPOINT: "http://minio.backbone:9000"
        MINIO_SECURE: "false"
        POSTGRES_DB: dicom
        POSTGRES_EFFECTIVE_CACHE_SIZE: 2GB
        POSTGRES_MAX_CONNECTIONS: "200"
        POSTGRES_PORT: "5432"
        POSTGRES_SHARED_BUFFERS: 512MB
        WILDFLY_WAIT_FOR: radiology-ldap:389

  secrets:
    db:
      namespace: [ care ]
      name: db
    git-sync:
      namespace: [ care ]
      name: git-creds
    care-secrets:
      namespace: [ care ]
    care-registry:
      namespace: [ care ]
    radiology-secrets:
      namespace: [ care ]
  


care-backend:
  namespace: care
  image:
    tag: dev-63-61b6d7d
  postgresDb: "care"
  redisUrl: "redis://redis.backbone:6379"
  celeryBrokerUrl: "redis://redis.backbone:6379/0"
  bucketEndpoint: "http://minio.backbone:9000"
  bucketExternalEndpoint: "https://minio-uat.digit.org"
  corsAllowedOrigins: '["https://unified-dev.digit.org"]'
  csrfTrustedOrigins: '["https://unified-dev.digit.org"]'
  ingress:
    enabled: true
    context: "api"

care-frontend:
  namespace: care
  image:
    tag: dev-30-bf1ee72
  ingress:
    enabled: true
    context: "care"

care-celery:
  namespace: care
  image:
    tag: dev-63-61b6d7d
  postgresDb: "care"
  redisUrl: "redis://redis.backbone:6379"
  celeryBrokerUrl: "redis://redis.backbone:6379/0"
  bucketEndpoint: "http://minio.backbone:9000"
  bucketExternalEndpoint: "https://minio-uat.digit.org"
  corsAllowedOrigins: '["https://unified-dev.digit.org"]'
  csrfTrustedOrigins: '["https://unified-dev.digit.org"]'

care-radiology:
  namespace: care
  storageClassName: gp2  # EKS GP2 storageclass; change to local-path for k3s
  ingress:
    enabled: true
    ohifContext: "/radiology-ohif"
    nginxContext: "/radio-proxy"
  config:
    minioEndpoint: "http://minio.backbone:9000"
    minioBucket: dicom-bucket
    careBackendServiceName: care-backend











 























