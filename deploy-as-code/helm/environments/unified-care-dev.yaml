global:
   domain: care-dev.digit.org ## Dedicated CARE subdomain; care services served at root "/"
   setup: fullsetup

cluster-configs:
  namespaces:  
    create: false
    values: [ care ]
      
  # egov platform owns root-ingress (egov ns, serves unified-dev.digit.org/).
  # care must NOT manage it — null it out so the chart default doesn't render.
  root-ingress: null
  configmaps:
    egov-config:
      namespace: [ care ]
      data:
        db-host: unified-dev-db-new.czvokiourya9.ap-south-1.rds.amazonaws.com ## Add db-host name eg: egov-demo.database.azure.com
        db-name: unifieddevdb ## Add db-name
        db-url: jdbc:postgresql://unified-dev-db-new.czvokiourya9.ap-south-1.rds.amazonaws.com:5432/unifieddevdb ## example: jdbc:postgresql://egov-demo.postgres.database.azure.com:5432/egov_demo
        db-url-no-schema: "jdbc:postgresql://unified-dev-db-new.czvokiourya9.ap-south-1.rds.amazonaws.com:5432/unifieddevdb" ## example: jdbc:postgresql://egov-demo.postgres.database.azure.com:5432/egov_demo
        domain: "https://care-dev.digit.org" ## Add your Domain Name
        egov-services-fqdn-name: "https://care-dev.digit.org/" ## Add your Domain Name
        logging-level-jdbc: "DEBUG"
        mobile-validation-workaround: "true"
        serializers-timezone-in-ist: "true"
        server-tomcat-max-connections: "500"
        server-tomcat-max-threads: "10"
        sms-enabled: "true"
        spring-datasource-tomcat-initialSize: "1"
        spring-datasource-tomcat-max-active: "2"
        spring-jpa-show-sql: "true"
        timezone: Asia/Kolkata
        tracer-errors-provideexceptionindetails: "true"

    egov-service-host:
      namespace: [ care ]
      data:
        # Care HMIS services
        care-backend: "http://care-backend.care:9000/"
        care-frontend: "http://care-frontend.care:80/"
        radiology-ohif: "http://radiology-ohif.care:80/"
        radiology-nginx: "http://radiology-nginx.care:80/"

    radiology-config:
      namespace: [ care ]
      data:
        AE_TITLE: DCM4CHEE
        ARCHIVE_DEVICE_NAME: dcm4chee-arc
        CARE_BACKEND_URL: "http://care-backend.care:9000"
        DICOM_PORT: "11112"
        DOMAIN: "care-dev.digit.org"
        JAVA_OPTS: "-Xms2g -Xmx4g -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m"
        LDAP_BASE_DN: dc=dcm4che,dc=org
        LDAP_DOMAIN: dcm4che.org
        LDAP_ORGANISATION: dcm4che.org
        LDAP_URL: ldap://radiology-ldap:389
        # DICOM archive object storage -> AWS S3 (shared egov bucket). dcm4chee/jclouds
        # writes under its own key structure within this bucket.
        MINIO_BUCKET: unified-care-dev
        MINIO_ENDPOINT: "https://s3.ap-south-1.amazonaws.com"
        MINIO_SECURE: "true"
        POSTGRES_DB: dicom
        POSTGRES_EFFECTIVE_CACHE_SIZE: 2GB
        POSTGRES_MAX_CONNECTIONS: "200"
        POSTGRES_PORT: "5432"
        POSTGRES_SHARED_BUFFERS: 512MB
        WILDFLY_WAIT_FOR: radiology-ldap:389

  secrets:
    db:
      namespace: [ care ]
      name: db
    care:
      namespace: [ care ]
      name: care-secrets
    egov-filestore:
      namespace: care
      name: egov-filestore
    care-registry:
      namespace: [ care ]
    radiology-secrets:
      namespace: [ care ]


care-backend:
  namespace: care
  postgresDb: "caredb"
  redisUrl: "redis://redis.backbone:6379"
  celeryBrokerUrl: "redis://redis.backbone:6379/0"
  # AWS S3 (native) — empty endpoints so boto3 targets the regional S3 endpoint.
  bucketProvider: "AWS"
  bucketEndpoint: ""
  bucketExternalEndpoint: ""
  bucketRegion: "ap-south-1"
  bucket: "unified-care-dev"   # single shared bucket for facility + patient files
  corsAllowedOrigins: '["https://care-dev.digit.org"]'
  csrfTrustedOrigins: '["https://care-dev.digit.org"]'
  ingress:
    enabled: true
    context: "api"   # served at https://care-dev.digit.org/api

care-frontend:
  namespace: care
  ingress:
    enabled: true
    context: ""      # SPA served at root https://care-dev.digit.org/
    # Main ingress for the domain — cert-manager provisions the TLS cert/secret here
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

care-celery:
  namespace: care
  postgresDb: "caredb"
  redisUrl: "redis://redis.backbone:6379"
  celeryBrokerUrl: "redis://redis.backbone:6379/0"
  # AWS S3 (native) — same shared bucket as care-backend
  bucketProvider: "AWS"
  bucketEndpoint: ""
  bucketExternalEndpoint: ""
  bucketRegion: "ap-south-1"
  bucket: "unified-care-dev"
  corsAllowedOrigins: '["https://care-dev.digit.org"]'
  csrfTrustedOrigins: '["https://care-dev.digit.org"]'

care-radiology:
  namespace: care
  storageClassName: gp3  # EKS GP3 storageclass (cluster default); change to local-path for k3s
  ingress:
    enabled: true
    # Radiology routes at root of the care-dev domain
    ohifContext: "/radiology-ohif"
    nginxContext: "/radio-proxy"
  config:
    # DICOM object storage -> AWS S3 (shared egov bucket)
    minioEndpoint: "https://s3.ap-south-1.amazonaws.com"
    minioBucket: unified-care-dev
    ohifRouterBasename: /radiology-ohif
    radioProxyPath: /radio-proxy
    careBackendServiceName: care-backend











 























