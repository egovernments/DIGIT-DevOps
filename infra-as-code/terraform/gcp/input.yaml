# NOTE: the keys below must match the <PLACEHOLDER> tokens in the GCP .tf files
# exactly, and every value must be wrapped in double quotes.

# ID of the GCP project where resources will be provisioned
GCP_PROJECT_ID: "project-name"

# GCP region for the resources (e.g. asia-south1 for Mumbai)
GCP_REGION: "asia-south1"

# GCP availability zone within the region above
GCP_AVAILABILITY_ZONE: "asia-south1-a"

# Environment/cluster name. Use lowercase alphanumeric characters and hyphens.
# For example: "gke-demo"
ENVIRONMENT_NAME: "gke-latest"

# Name you want to give to your database
# DB name must contain only alphanumeric characters
DATABASE_NAME: "testdemodb"

# DB username you want
# DB user name must contain only alphanumeric characters
DATABASE_USERNAME: "testdemo"

# Name of the GCS bucket used to store the terraform state.
# Create it via the remote-state step first, then set the same name here.
terraform_state_bucket_name: "gke-latest-state-gcs-bucket"
